,\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53209,\"titulo\":\"Al duque le gusta jugar con mi coraz\\u00f3n\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/LEGUSTA12.webp\",\"fecha\":\"2025-08-17 14:28:48\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Al duque le gusta jugar con mi coraz\\u00f3n\\r\\n\\r\\nLaveri Attilie, una joven que fue vendida como sirvienta en su infancia y creci\\u00f3 sin educaci\\u00f3n formal, esconde un don extraordinario: un talento innato para tejer palabras que encienden pasiones. Bajo el seud\\u00f3nimo de \\\"Madame Rosa\\\", se ha ganado un nombre entre los plebeyos como la escriba de cartas de amor que hacen latir los corazones. Pero su vida...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53207,\"titulo\":\"Me convert\\u00ed en la secretaria de mi personaje favorito\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/VILLANO3.webp\",\"fecha\":\"2025-08-17 14:16:13\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me convert\\u00ed en la secretaria de mi personaje favorito\\r\\n\\r\\nMia Risicha, una ferviente lectora de su novela favorita, despierta con un sobresalto en el mundo de su novela favorita, reencarnada como una pieza clave en el destino de su historia amada. Seg\\u00fan el guion original, su hermana menor est\\u00e1 destinada a convertirse en emperatriz, asegurando a Mia una vida de paz y privilegios... pero solo s...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53096,\"titulo\":\"Atrapada por el amor obsesivo de dos de los tres que me condenaron en mi vida pasada\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/TRESDEDOS12W.webp\",\"fecha\":\"2025-08-10 22:10:01\",\"tipo\":\"Manga\",\"genres\":[\"Ree