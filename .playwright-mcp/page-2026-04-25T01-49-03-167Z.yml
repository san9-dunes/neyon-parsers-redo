es\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El gran jefe en estado vegetativo ya no puede seguir fingiendo\\r\\n\\r\\nQiao Xi fue abandonada por su madre en el campo cuando era ni\\u00f1a. Tras la muerte de su padre y el nuevo matrimonio de su madre, nunca conoci\\u00f3 el calor de una familia. Veinte a\\u00f1os despu\\u00e9s, esa madre sin coraz\\u00f3n la trae de vuelta a la ciudad para obligarla a sustituir a su hermanastra en un matrimonio de conveniencia: casarse c...\",\"esGratis\":true,\"firstChapterId\":54540,\"status\":\"Ongoing\"},{\"id\":54483,\"titulo\":\"Esta noche, me ahogo en el amor obsesivo del pr\\u00edncipe\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/01\\/AHOGO12W.webp\",\"fecha\":\"2026-01-26 17:59:10\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Har\\u00e9n Inverso\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Esta noche, me ahogo en el amor obsesivo del pr\\u00edncipe\\r\\n\\r\\nEn la corte del Reino de K\\u014dmei existe un linaje femenino que ha servido al palacio durante generaciones. Todas las mujeres de esta casa nacen con una habilidad especial: al unirse carnalmente con un hombre, absorben y agotan por completo el deseo sexual de su pareja para el resto de su vida. Ling Ling (Rinrin), la heredera de este poder...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54481,\"titulo\":\"El guerrero m\\u00e1s temido me susurr\\u00f3 \\\"todo est\\u00e1 bien\\\"\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/01\\/TODOESTA12.webp\",\"fecha\":\"2026-01-26 17:57:16\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Hombre\"],\"genero\":\"Mujer\",\"descripcion\":\"El guerrero m\\u00e1s temido me susurr\\u00f3 \\\"todo est\\u00e1 bien\\\"\\r\\n\\r\\nLa princesa del reino, Meltia, qued\\u00f3 profundamente traumatizada por los horrores que presenci\\u00f3 durante la guerra, desarrol