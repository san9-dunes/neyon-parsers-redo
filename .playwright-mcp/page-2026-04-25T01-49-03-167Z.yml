\nLiliana, hija de un conde, arrastra el apodo cruel de \\\"santa in\\u00fatil y reprobada\\\", eclipsada por una hermanastra que, en secreto, le succiona la magia como un vampiro energ\\u00e9tico, dejando su poder real sepultado bajo capas de agotamiento. Un d\\u00eda, un mensajero de la frontera trae una propuesta i...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53868,\"titulo\":\"La novia sacrificada por contrato: es amada por el marqu\\u00e9s de coraz\\u00f3n fr\\u00edo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/DEFRIO12D.webp\",\"fecha\":\"2025-10-30 11:03:54\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Magia\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La novia sacrificada por contrato: es amada por el marqu\\u00e9s de coraz\\u00f3n fr\\u00edo\\r\\n\\r\\nLilia, hija del conde Macbeth, es una maga con magia extremadamente d\\u00e9bil y es despreciada como \\\"in\\u00fatil\\\". Un d\\u00eda, por las leyes del templo, se convierte en \\\"novia sacrificada\\\" y es enviada como esposa al marqu\\u00e9s Lysas. La \\\"novia sacrificada\\\" es un ritual donde se casa a alguien de magia d\\u00e9bil con un noble, y a...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53630,\"titulo\":\"Soy la Beb\\u00e9 de una familia de Tiranos, Pero extra\\u00f1amente estoy siendo mimada hasta el exceso\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/FTIRANOS12s.webp\",\"fecha\":\"2025-10-29 15:14:44\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Beb\\u00e9s\",\"Ni\\u00f1os\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Soy la Beb\\u00e9 de una familia de Tiranos, Pero extra\\u00f1amente estoy siendo mimada hasta el exceso\\r\\n\\r\\nDeb\\u00eda haber muerto en el pat\\u00edbulo, pero al despertar me hab\\u00eda reencarnado en un beb\\u00e9. En mi vida anterior era la administradora qu