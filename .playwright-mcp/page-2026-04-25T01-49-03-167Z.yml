ue su hijo villano la mate\\r\\nLa vida de Mar\\u00eda, una \\u00e1vida lectora de novelas de fantas\\u00eda, da un giro inesperado cuando se despierta en el cuerpo de la malvada madrastra de su libro favorito. Consciente del oscuro destino que le espera a manos de su hijastro, Alfred, el temido villano de la historia, Mar\\u00eda decide reescribir su papel en el mundo de la fantas\\u00eda. Determina...\",\"esGratis\":true,\"firstChapterId\":23548,\"status\":\"Ongoing\"},{\"id\":21864,\"titulo\":\"Destinos Entrelazados: Un Amor m\\u00e1s all\\u00e1 de la Magia\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/05\\/DESTINOS12D.webp\",\"fecha\":\"2024-05-24 15:17:42\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Manhwa\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Destinos Entrelazados: Un Amor m\\u00e1s all\\u00e1 de la Magia\\r\\nEl Reino de Belbron florece gracias al poder de la magia del agua utilizada por la familia Vircast y se le llama la \\\"Tierra del Agua Hermosa\\\". Sin embargo, Lara, la hija de la familia Villcast, no puede usar magia de agua y vive en un ambiente fr\\u00edo como una verg\\u00fcenza para su familia.\\r\\nUn d\\u00eda, la familia Vircast recibe una oferta de matri...\",\"esGratis\":true,\"firstChapterId\":24686,\"status\":\"Ongoing\"},{\"id\":20090,\"titulo\":\"La Falsa Acusaci\\u00f3n que Cambi\\u00f3 mi Vida: De Buena a Chica Mala\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/05\\/FALSA12.webp\",\"fecha\":\"2024-05-11 15:50:27\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La Falsa Acusaci\\u00f3n que Cambi\\u00f3 mi Vida: De Buena a Chica Mala\\r\\nEvelin Cordelia enfrenta el destino m\\u00e1s cruel: la muerte por un crimen que no cometi\\u00f3. Condenada por adulterio en una \\u00e9poca donde la palabra de una mujer vale poco, Evelin clama su inocencia ante un D