cripcion\":\"\\u00bfPuedo ser yo quien lo destruya todo? \\u00bfVerdad? :La pura e inocente santa jura venganza\\r\\n\\r\\nUna fantas\\u00eda rom\\u00e1ntica de venganza en la que una chica enga\\u00f1ada por el mundo entero se al\\u00eda con el Rey Demonio.\\r\\n\\r\\nSara, una estudiante de instituto, es invocada un d\\u00eda al otro mundo del Reino de Linus y proclamada \\u00absanta\\u00bb.\\r\\nSu misi\\u00f3n: mantener el \\u00abGran Barrera\\u00bb que protege al reino de los demo...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54263,\"titulo\":\"El pr\\u00edncipe heredero con tendencias yanderes, ama con locura a la princesa desdichada\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/CONTEN12E.webp\",\"fecha\":\"2025-11-23 13:53:33\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El pr\\u00edncipe heredero con tendencias yanderes, ama con locura a la princesa desdichada\\r\\n\\r\\n\\u00a1Una princesa maltratada termina siendo amada y mimada hasta el extremo por un tir\\u00e1nico pr\\u00edncipe \\u2026 \\u00a1y se casan!? La princesa del reino, L\\u00eda, creci\\u00f3 siendo maltratada por su propio padre y su hermana mayor.\\r\\nTras perder la guerra contra el pa\\u00eds vecino, le cargan toda la culpa y el pueblo la desprec...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54261,\"titulo\":\"La santa que salv\\u00f3 el mundo y lo que sucedi\\u00f3 despu\\u00e9s\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/MUNDO12D.webp\",\"fecha\":\"2025-11-23 13:41:08\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Magia\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La santa que salv\\u00f3 el mundo y lo que sucedi\\u00f3 despu\\u00e9s\\r\\n\\r\\nLa santa que salv\\u00f3 el mundo y lo que sucedi\\u00f3 despu\\u00e9s.\\r\\nLa santa Meiji recibi\\u00f3 una maldici\\u00f3n como precio por derrotar al rey demonio. Un a\\u00f1o de vida restante, ese fue el precio.\\r\\nPara deshacer la maldici\\u00f3n, se necesitaba \\u00abel beso de aquellos que se aman mutuamente\\u00bb, pero su prometido Harman no crey\\u00f3 en su regreso y se cas\\u00f3 con...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54247,\"titulo\":\"\\u00a1Querido duque, con todo respeto\\u2026 voy a matarlo!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/MATARLO12W.webp\",\"fecha\":\"2025-11-20 10:34:37\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1Querido duque, con todo respeto\\u2026 voy a matarlo!\\r\\n\\r\\nEstella reencarna en su otome game favorito\\u2026\\r\\n\\u00a1pero despierta justo antes del bad end donde muere asesinada! Ella lo sabe todo: si no hace nada, el asesino a sueldo Robert aparecer\\u00e1 y la matar\\u00e1.\\r\\nLa \\u00fanica forma de evitarlo es\\u2026 \\u00a1matarlo antes de que \\u00e9l la mate a ella! Con una firme intenci\\u00f3n asesina en el coraz\\u00f3n, Estella se enfr...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54099,\"titulo\":\"\\u00bfNo quiere quedarse a hacer horas extras conmigo, pr\\u00edncipe heredero?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/EXTRA12D.webp\",\"fecha\":\"2025-11-14 11:10:44\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfNo quiere quedarse a hacer horas extras conmigo, pr\\u00edncipe heredero?\\r\\n\\r\\nEto Mika, una dise\\u00f1adora esclava corporativa en una gran empresa, deber\\u00eda haber muerto de agotamiento\\u2026 pero reencarna como la condesa Minuette Rubain, que est\\u00e1 a punto de casarse por conveniencia.\\r\\nMinuette no quer\\u00eda un matrimonio pol\\u00edtico, pero al enterarse de que su prometido es el pr\\u00edncipe heredero, cambia de i...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54097,\"titulo\":\"Soy una madre de gemelos que escap\\u00f3 del pr\\u00edncipe heredero que me odiaba, aunque yo lo amaba con locura\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/SOYMADRE12D.webp\",\"fecha\":\"2025-11-14 10:58:08\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Ni\\u00f1os\",\"Protagonista femenina fuerte\",\"Madre\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Soy una madre de gemelos que escap\\u00f3 del pr\\u00edncipe heredero que me odiaba, aunque yo lo amaba con locura\\r\\n\\r\\nJaina, la hija mayor de la familia Yale, ama en secreto a Cecil, pr\\u00edncipe heredero del Imperio Toronto.\\r\\nSin poder usar magia y maltratada por su familia, un d\\u00eda su padre le ordena un matrimonio pol\\u00edtico\\u2026 \\u00a1y el prometido resulta ser precisamente Cecil! Sin embargo, mientras Jaina su...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54051,\"titulo\":\"\\u00a1No fui elegida como santa\\u2026 pero el segundo pr\\u00edncipe me eligi\\u00f3 a m\\u00ed!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/NOFUI12S.webp\",\"fecha\":\"2025-11-08 23:18:22\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Magia\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1No fui elegida como santa\\u2026 pero el segundo pr\\u00edncipe me eligi\\u00f3 a m\\u00ed!\\r\\n\\r\\nMarie naci\\u00f3 como hija de uno de los dos grandes clanes de santas. Soport\\u00f3 un entrenamiento que rayaba en el maltrato para perfeccionar su poder curativo, pero la elegida como santa fue Julia, quien gozaba del apoyo del pueblo gracias a su belleza. En medio de la decepci\\u00f3n, a Marie solo le asignaron el puesto de \\u00aba...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54049,\"titulo\":\"\\u00a1D\\u00e9jenme mostrarles a la villana perfecta que puedo ser!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/PUEDOSER1.webp\",\"fecha\":\"2025-11-08 23:08:25\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1D\\u00e9jenme mostrarles a la villana perfecta que puedo ser!\\r\\n\\r\\n\\u00abMi familia me arrebat\\u00f3 todo lo que era preciado para m\\u00ed\\u2026 \\u00a1ahora me toca a m\\u00ed arrebat\\u00e1rselo todo!\\u00bb Bianca se esforz\\u00f3 al m\\u00e1ximo por apoyar a su familia para convertirse en una dama digna del brazalete que hered\\u00f3 de su madre.\\r\\nSin embargo, lo que le esperaba fue la traici\\u00f3n de la familia en la que confiaba\\u2026 Arrojada al a...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54042,\"titulo\":\"Reencarn\\u00e9 como la hija del jefe final, \\u00a1pero rechazo el destino de morir!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/HIJAFINAL12D.webp\",\"fecha\":\"2025-11-07 12:59:55\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Reencarn\\u00e9 como la hija del jefe final, \\u00a1pero rechazo el destino de morir!\\r\\n\\r\\nUn d\\u00eda, reencarn\\u00e9 como Erika Norris, la fr\\u00e1gil y enfermiza chica de una novela.\\r\\nCriada como hija de Papa, la gente la llama \\u00abLa Colibr\\u00ed: un p\\u00e1jaro peque\\u00f1o y hermoso, ya extinto\\u00bb.\\r\\nPero en realidad, no es m\\u00e1s que una pieza que su padre usa para obtener beneficios\\u2026\\r\\nAl enterarse de que ella y toda su famili...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54039,\"titulo\":\"Aunque es una princesa fracasada, en esta vida es amada por el Gran Duque\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/VIDAES1S.webp\",\"fecha\":\"2025-11-07 12:49:11\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Aunque es una princesa fracasada, en esta vida es amada por el Gran Duque\\r\\n\\r\\nSaphir, princesa del Reino de Emeraten, estaba prometida al pr\\u00edncipe heredero del Imperio Valoreia. Sin embargo, este matrimonio concertado estuvo plagado de malicia desde el principio. Acusada falsamente de asesinato, Saphir fue encarcelada y torturada... Con la esperanza de ser liberada mediante la muerte, fue asesi...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54037,\"titulo\":\"\\u00a1La lanzadora de piedras se casa\\u2026 y el pr\\u00edncipe no para de mimarla!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/PIEDRA12.webp\",\"fecha\":\"2025-11-07 12:34:48\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1La lanzadora de piedras se casa\\u2026 y el pr\\u00edncipe no para de mimarla!\\r\\n\\r\\nMyriele, hija pobre de un bar\\u00f3n rural, viaja a la capital cargando las esperanzas familiares para encontrar un marido rico. Ella es xcelente en caza, tareas del hogar y lanzar piedras, pero todo le parece fuera de lugar en la gran ciudad.\\r\\nEn su b\\u00fasqueda del esposo ideal aparece, \\u00a1nada menos que el pr\\u00edncipe segundo!\\r...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54035,\"titulo\":\"\\u00a1Soy una simple oficinista, pero el duque no me suelta!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/OFICINISTA1.webp\",\"fecha\":\"2025-11-07 08:27:38\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1Soy una simple oficinista, pero el duque no me suelta!\\r\\n\\r\\nShuri es una oficinista com\\u00fan, adicta al trabajo y sin suerte en amores. Todos la tildan de antip\\u00e1tica y el matrimonio le parece ciencia ficci\\u00f3n.\\r\\nUn d\\u00eda, su jefe Ilias, reci\\u00e9n nombrado duque, le propone matrimonio de golpe:\\r\\n\\u2014\\u201cSiempre estuve pendiente de ti.\\u201d \\u201cTodo en ti me parece adorable.\\u201d\\r\\nAt\\u00f3nita, Shuri acepta segu...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54029,\"titulo\":\"La obsesi\\u00f3n del tirano ca\\u00eddo en tinieblas no se detiene\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/CAIDO12S.webp\",\"fecha\":\"2025-11-05 14:54:08\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Magia\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La obsesi\\u00f3n del tirano ca\\u00eddo en tinieblas no se detiene\\r\\n\\r\\nLatis, princesa sanadora del imperio, viv\\u00eda encadenada a un trono de agujas: cada d\\u00eda le arrancaban la magia hasta dejarla temblando.\\r\\nUn amanecer sangriento, el cielo se rompe y aparece Diavel, el conquistador maldito, cubierto de runas negras que devoran su piel.\\r\\nSu orden es un latigazo:\\r\\n\\u2014\\u201cC\\u00farame. Si fallas, te corto el cue...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54001,\"titulo\":\"\\u00a1Mi meta era ser la villana perfecta, pero el mundo me coron\\u00f3 como santa!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/VILLANAW1.webp\",\"fecha\":\"2025-11-03 16:58:21\",\"tipo\":\"Manga\",\"genres\":[\"Comedia\",\"Drama\",\"Romance Escolar\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1Mi meta era ser la villana perfecta, pero el mundo me coron\\u00f3 como santa!\\r\\n\\r\\nAmelia, robada de su magia sagrada por su hermanastra y echada de casa con una patada en el orgullo, cae de rodillas en un bosque donde el Rey Demonio Regulus la encuentra hecha un mar de l\\u00e1grimas.\\r\\n\\u00c9l, con sonrisa de tibur\\u00f3n, le ofrece un trato:\\r\\n\\\"Convi\\u00e9rtete en mi villana estrella y te doy poder oscuro ilimitad...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53996,\"titulo\":\"La villana retirada quiere pasar desapercibida\\u2026 \\u00a1pero el destino no la deja!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/PASAR12S.webp\",\"fecha\":\"2025-11-03 09:16:58\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La villana retirada quiere pasar desapercibida\\u2026 \\u00a1pero el destino no la deja!\\r\\n\\r\\nElizabeth Russell, duquesa perfecta y ex-alumna estrella de la Academia de Reinas, recibe el golpe m\\u00e1s bajo: su prometido, el pr\\u00edncipe heredero, la se\\u00f1ala con el dedo y grita \\\"\\u00a1T\\u00fa eres la villana!\\\".\\r\\nCoraz\\u00f3n roto, reputaci\\u00f3n hecha trizas, corona perdida.\\r\\nSoluci\\u00f3n: pasaporte al pa\\u00eds vecino + maleta llena...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53987,\"titulo\":\"La hija contractual adorada por la casa del conde\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/ADORADA12D.webp\",\"fecha\":\"2025-11-01 11:13:58\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Ni\\u00f1os\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La hija contractual adorada por la casa del conde\\r\\n\\r\\n\\\"\\u00bfSer\\u00e9 yo la persona m\\u00e1s desgraciada del universo?\\\" \\u2014pensaba la protagonista, abandonada por su familia y sola hasta su \\u00faltimo aliento. \\u00a1Pum! Reencarna en el mundo de una novela\\u2026 como Isolde, una ni\\u00f1a criada en la miseria, sin un abrazo ni un pan que llevarse a la boca.\\r\\nUn d\\u00eda, aparece Bernand, el heredero del conde, con una propu...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":