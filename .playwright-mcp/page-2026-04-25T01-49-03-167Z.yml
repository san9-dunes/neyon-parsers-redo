 de la infancia como familiar\\r\\nWataru y Rumi, dos amigos de la infancia con un lazo m\\u00e1s profundo de lo que las palabras pueden definir, fueron arrancados de su vida cotidiana y arrojados a un mundo de fantas\\u00eda donde enfrentaron peligros inimaginables. Como domador legendario, Wataru y su fiel compa\\u00f1era Rumi, convertida en su fam...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53088,\"titulo\":\"Un matrimonio falso que comienza con un contrato\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/COMIENZA12W.webp\",\"fecha\":\"2025-08-10 18:08:28\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Un matrimonio falso que comienza con un contrato\\r\\n\\r\\nMayu Aoi, atrapada en las ruinas de una familia destrozada por la bancarrota y la tragedia, har\\u00eda cualquier cosa por salvar a su hermano mayor, injustamente encarcelado por un crimen que no cometi\\u00f3. Con el coraz\\u00f3n en la mano, acude al legendario abogado Ouki Miura, un hombre tan brillante como enigm\\u00e1tico, cuya reputaci\\u00f3n en los tribunales...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53032,\"titulo\":\"La rosa salvaje que abraza la escarcha\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/ROSA12D.webp\",\"fecha\":\"2025-08-02 12:08:36\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La rosa salvaje que abraza la escarcha\\r\\n\\r\\nLibert\\u00e9, la hija m\\u00e1s amada del anterior emperador, era considerada la futura emperatriz por todos. Sin embargo, tras la muerte de su padre, su hermano menor se convierte en emperador. Manipulada por las intrigas del primer ministro, Libert\\u00e9 es enviada lejos del palacio imperial para casarse con Yuraha, el gran duque del Norte. Durante el viaje, enfre...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53030,\"titulo\":\"La novia desdichada es robada por el hermoso rey drag\\u00f3n\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/REYDRAGON12F.webp\",\"fecha\":\"2025-08-02 11:40:37\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Magia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La novia desdichada es robada por el hermoso rey drag\\u00f3n\\r\\n\\r\\nLeila, una joven de cabellos escarlatas, lleva el estigma de la \\\"Doncella Escarlata\\\", cuya maldici\\u00f3n casi destruy\\u00f3 un reino en el pasado. Criada bajo el peso del desprecio y el aislamiento, su destino parece sellado cuando la obligan a un matrimonio pol\\u00edtico con un anciano rey. Sin embargo, en el camino hacia su nueva prisi\\u00f3n, el d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53028,\"titulo\":\"Un matrimonio de conveniencia con fecha de caducidad\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/08\\/FECHA12F.webp\",\"fecha\":\"2025-08-02 11:29:39\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Un matrimonio de conveniencia con fecha de caducidad\\r\\n\\r\\nClaire, la primog\\u00e9nita de una empobrecida familia marquesal, lleva las cicatrices de una vida marcada por el desprecio y el maltrato de sus propios parientes. Cuando Illeil, el joven duque m\\u00e1s codiciado del reino, le propone un matrimonio de conveniencia con un plazo de solo un a\\u00f1o, Claire ve en ello una chispa de esperanza para escapar...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":52888,\"titulo\":\"Te amo, aunque tu posible destino sea acabar conmigo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/TEAMO12D.webp\",\"fecha\":\"2025-07-25 14:44:42\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripci