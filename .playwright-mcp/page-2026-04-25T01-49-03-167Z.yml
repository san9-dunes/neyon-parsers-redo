ortada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/12\\/ENCARINES12w.webp\",\"fecha\":\"2024-12-12 18:38:48\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Manga Roshidere Lv99\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"No te encari\\u00f1es de una mujer malvada cuyo \\u00fanico objetivo es la venganza\\r\\nIsabella, siempre considerada un fracaso en comparaci\\u00f3n con su hermana menor, la santa, conoce un d\\u00eda a Rayvan, un joven vagabundo con quien empieza a pasar tiempo y a sentir una conexi\\u00f3n familiar. Sin embargo, cuando su poder de santa despierta, su hermana trama una conspiraci\\u00f3n que resulta en la muerte de Rayvan. E...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":43615,\"titulo\":\"Me niego a aceptar los arrepentimientos de un traidor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/12\\/MENIEGO12.webp\",\"fecha\":\"2024-12-06 23:39:49\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me niego a aceptar los arrepentimientos de un traidor\\r\\n\\r\\n\\r\\n\\r\\nCassia se cas\\u00f3 con Douglas, el hombre de sus sue\\u00f1os, pero su matrimonio solo dur\\u00f3 tres a\\u00f1os antes de ser forzada a divorciarse y expulsada de su hogar. Tras demostrar su visi\\u00f3n para los negocios, Cassia se convierte en millonaria. Un d\\u00eda, Douglas, habi\\u00e9ndolo perdido todo, regresa suplicando perd\\u00f3n. Aunque Cassia decide darle o...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":43068,\"titulo\":\"La hija del h\\u00e9roe consigue evitar las banderas de la muerte\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/12\\/HEROE12W.webp\",\"fecha\":\"2024-12-03 20:30:37\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Manga Akari Yakuin\",\"Muje