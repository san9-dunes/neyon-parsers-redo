en, una hu\\u00e9rfana pobre que vive rebuscando comida en los callejones.Un d\\u00eda, mientras busca entre ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55239,\"titulo\":\"Al final, elijo casarme contigo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/CASARME12D.webp\",\"fecha\":\"2026-04-08 21:09:06\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Al final, elijo casarme contigo\\r\\n\\r\\nLumina, la hija de una casa ducal en decadencia, decide aceptar el compromiso matrimonial con el Marqu\\u00e9s Lugol para salvar a su familia y a su hermano enfermo.Justo en ese momento, recibe una carta misteriosa enviada por \\u201cella misma del futuro, un a\\u00f1o despu\\u00e9s\\u201d.En la carta se describe un destino tr\\u00e1gico: la muerte de su querido hermano y su propia ruina...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55233,\"titulo\":\"La heredera traicionada del imperio de Aisha\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/AISHA12D.webp\",\"fecha\":\"2026-04-05 22:00:53\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La heredera traicionada del imperio de Aisha\\r\\n\\r\\nAijin Turandeus era la leg\\u00edtima heredera al trono del imperio Aisha.Sin embargo, por la conspiraci\\u00f3n de su t\\u00edo Lazeo y Frederick \\u2014quien busca venganza contra su padre\\u2014, termina siendo traicionada y vendida como mercanc\\u00eda en una subasta.Por otro lado, el pr\\u00edncipe heredero del imperio Decan, Kaiden von Wilterauss, se entera de que la \\u201cSan...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55228,\"titulo\":\"Soy una santa defectuosa, pero el duque insaciable se aferra a m\\u00ed\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/AFE