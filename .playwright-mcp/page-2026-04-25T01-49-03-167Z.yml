ue acorta su vida, descubre que su \\u00fanica salvaci\\u00f3n es un matrimonio con un duque poseedor de energ\\u00edas oscuras. Huyendo del orfanato, se refugia en la mansi\\u00f3n del duque, donde con astucia y carisma, intenta seducir a Levi, el heredero al ducado. Pero el encuentro con Levi toma...\",\"esGratis\":true,\"firstChapterId\":27972,\"status\":\"Ongoing\"},{\"id\":17218,\"titulo\":\"El Segundo Amanecer de Lisbeth: Una Vida Pasada para Cambiar el Futuro\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/04\\/Amane12.webp\",\"fecha\":\"2024-04-04 15:59:15\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El Segundo Amanecer de Lisbeth: Una Vida Pasada para Cambiar el Futuro\\r\\nLisbeth, una joven de esp\\u00edritu indomable y mente aguda, se encuentra en el umbral de una oportunidad \\u00fanica: revivir su vida desde los siete a\\u00f1os con los recuerdos de su existencia anterior intactos. Nacida en la nobleza finlandesa y atrapada en las garras de un matrimonio pol\\u00edtico que la llev\\u00f3 a un destino tr\\u00e1gico, Li...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":17168,\"titulo\":\"La Madrastra Incompetente: Amada a Pesar de Todo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/04\\/AUNQUE12W.webp\",\"fecha\":\"2024-04-04 13:29:48\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Ni\\u00f1os\",\"+16\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La Madrastra Incompetente: Amada a Pesar de Todo\\r\\nElsha, la despreciada hija de un duque, ha vivido a la sombra de la cr\\u00edtica y el maltrato, marcada por la etiqueta de \\u201cincompetente\\u201d debido a una educaci\\u00f3n deficiente. Su destino toma un giro inesperado cuando el Emperador decreta su matrimonio con Rolf, el temido Gran Duque de Iceberg, un h\\u00e9roe de guerra envuelto en rumores oscuros y ate...\",\"esGratis\":true,\"firstChapterId\":18358,\"status\":\"Ongoing\"},{\"id\":17019,\"titulo\":\"M\\u00e1s all\\u00e1 del compromiso roto: La Hija abandonada es adorada por el pr\\u00edncipe\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/03\\/ADORADA1.webp\",\"fecha\":\"2024-03-27 20:22:32\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"M\\u00e1s all\\u00e1 del compromiso roto: La Hija abandonada es adorada por el pr\\u00edncipe\\r\\n\\r\\n\\r\\nEstelle Frozes, la hija de un se\\u00f1or feudal local, pens\\u00f3 que se casar\\u00eda con su amigo de la infancia y vivir\\u00eda una vida feliz. pero eso no fue asi, ya que su vida cambia dram\\u00e1ticamente debido a la repentina cancelaci\\u00f3n de su compromiso y su habilidad \\u00fanica para ver las emociones de los dem\\u00e1s a trav\\u00e9s del ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":16674,\"titulo\":\"El protagonista obsesionado me tiene encerada\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/03\\/OBSE1.webp\",\"fecha\":\"2024-03-27 15:09:35\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El protagonista obsesionado me tiene encerrada.\\r\\nEn un giro inesperado del destino, Jaina se encuentra atrapada en la vida de la hero\\u00edna de un juego de amor, un mundo que desaf\\u00eda todas sus expectativas. Anhelando la soledad, Jaina se ve obligada a reconsiderar su deseo de aislamiento cuando el protagonista masculino, un hombre de coraz\\u00f3n puro y sincero, entra en su vida, ofreci\\u00e9ndole un tip...\",\"esGratis\":true,\"firstChapterId\":16677,\"status\":\"Ongoing\"},{\"id\":15502,\"titulo\":\"Juventud oculta: La Doble Vida de Akari-sensei\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/03\\/AKARI12W.webp\",\"fecha\":\"2024-03-06 21:33:38\",\"tipo\":\"Manga\",\"genres\":[\"Comedia\",\"Romance Escolar\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Juventud oculta: La Doble Vida de Akari-sensei\\r\\nUn estudiante descubre que la chica de secundaria que encontr\\u00f3 por la noche es en realidad su maestra, Akari-sensei, disfrazada con un uniforme escolar. Al examinar su cuaderno personal, se revelan deseos juveniles y prohibidos que ella anhela experimentar. Tras la revelaci\\u00f3n de su secreto, Akari-sensei busca revivir su juventud perdida y pide a...\",\"esGratis\":true,\"firstChapterId\":15504,\"status\":\"Ongoing\"},{\"id\":15261,\"titulo\":\"Un romance apasionadamente indebido\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/03\\/ROMANCE1.webp\",\"fecha\":\"2024-03-06 14:29:56\",\"tipo\":\"Manhua\",\"genres\":[\"Romance\",\"Comedia\",\"Drama\",\"Venganza\",\"Protagonista Dominante\",\"+15\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Un romance apasionadamente indebido\\r\\nDos personas comparten una vida juntos pero mantienen secretos y sue\\u00f1os distintos, desconociendo la existencia de una \\u201ctercera persona\\u201d en su relaci\\u00f3n. Esta situaci\\u00f3n parece ser una excusa para vivir en enga\\u00f1o, tanto personal como mutuo, ocultando la verdad detr\\u00e1s de su aparente cotidianidad.\",\"esGratis\":true,\"firstChapterId\":15263,\"status\":\"Ongoing\"},{\"id\":15201,\"titulo\":\"Viviendo una vida de lujo con la pensi\\u00f3n alimenticia del emperador tirano\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/03\\/VAMOS12E.webp\",\"fecha\":\"2024-03-06 07:52:00\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Protagonista Dominante\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"viviendo una vida de lujo con la pensi\\u00f3n alimenticia del empe