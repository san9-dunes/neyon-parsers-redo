y lo hice m\\u00edo\\u2026 \\u00a1por la fuerza!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/MIO12W.webp\",\"fecha\":\"2025-10-31 19:26:22\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Emborrach\\u00e9 a mi crush imposible y lo hice m\\u00edo\\u2026 \\u00a1por la fuerza!\\r\\n\\r\\nUn cami\\u00f3n, un flash, y despierto wall-doneada por un pr\\u00edncipe de hielo que me mira como si fuera un insecto. \\u00a1Bingo! Soy Olivia Custer, la villana de lujo del manga que devor\\u00e9 en otra vida.\\r\\nCinco a\\u00f1os atr\\u00e1s, Olivia llevaba en el pecho un amor unilateral tan ardiente como suicida por Inslet, el estudiante perfecto: bel...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53977,\"titulo\":\"Aunque solo soy una madrastra por contrato, el tirano me sobreprotege igual que a su propia hija\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/PROPIA12S.webp\",\"fecha\":\"2025-10-31 19:11:18\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Ni\\u00f1os\",\"Romance obsesivo\",\"Madre\",\"Madrastra\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Aunque solo soy una madrastra por contrato, el tirano me sobreprotege igual que a su propia hija\\r\\n\\r\\nArianelle despierta en el cuerpo de una concubina mob programada para morir en la noche de bodas a manos del emperador Nathan, el tirano que hace temblar continentes. Su plan: convertirse en planta decorativa y pasar desapercibida. Error. El tirano la mira, parpadea\\u2026 y \\u00a1boda express!\\r\\nJusto cu...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53874,\"titulo\":\"Un pacto de tres a\\u00f1os con el mensajero de la muerte\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/3ANOS12D.webp\",\"fecha\":\"2025-10-30 11:48:11\",\"tipo\":\"Manga\",\"gen