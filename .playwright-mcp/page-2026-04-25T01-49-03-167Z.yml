 de su boda, el velo de su felicida...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":52654,\"titulo\":\"Amada por el duque que quiso matarme\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/QUISO12F.webp\",\"fecha\":\"2025-07-20 18:22:06\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Amada por el duque que quiso matarme\\r\\n\\r\\nRia, una joven sacrificada al altar del deber para salvar a su familia, se casa con el temido duque Luke Baker, cuya fama de crueldad y frialdad hace temblar los corazones del reino. Pero apenas el velo nupcial cae, su mundo se desmorona: Luke, en un acto inexplicable, intenta acabar con su vida. Al borde de la muerte, con el alma sumida en la desesperaci...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":52603,\"titulo\":\"Mi aventura de una noche fue con mi esposo, el marqu\\u00e9s de la muerte\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/FURTIVA12D.webp\",\"fecha\":\"2025-07-15 19:16:44\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Mi aventura de una noche fue con mi esposo, el marqu\\u00e9s de la muerte\\r\\n\\r\\nLuce, una duquesa de coraz\\u00f3n roto, ve su futuro desmoronarse cuando su hermanita le arrebata a su prometido, dej\\u00e1ndola al borde del abismo. Resignada a un matrimonio no deseado con Arnolfo, el temido \\\"Marqu\\u00e9s de la Muerte\\\", cuya reputaci\\u00f3n oscura hace temblar al reino, Luce decide reclamar una \\u00faltima chispa de libertad...\",\"esGratis\":true,\"firstChapterId\":52737,\"status\":\"Ongoing\"},{\"id\":51323,\"titulo\":\"\\u00a1No puedo dejar de adorar a la mujer m\\u00e1s malvada del imperio!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/ADORAR12W.webp\",\"fecha\":\"2025-07-12 09:47:59\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Magia\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1No puedo dejar de adorar a la mujer m\\u00e1s malvada del imperio!\\r\\nRaven, el duque m\\u00e1s encantador y libertino del imperio, vive una vida de placeres sin compromiso, conquistando corazones con su carisma irresistible. Pero su mundo de desenfado se tambalea cuando Estrella, la infame gran duquesa conocida como la \\\"villana suprema\\\" y temida por su aversi\\u00f3n a los hombres, irrumpe en su vida con una...\",\"esGratis\":true,\"firstChapterId\":51326,\"status\":\"Ongoing\"},{\"id\":51166,\"titulo\":\"El segundo adi\\u00f3s que nunca lleg\\u00f3\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/LLEGO12F.webp\",\"fecha\":\"2025-07-09 11:08:51\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El segundo adi\\u00f3s que nunca lleg\\u00f3\\r\\nTsukino Tatenishi, hija ileg\\u00edtima de un magnate, creci\\u00f3 en la sombra del desprecio, anhelando un amor que nunca conoci\\u00f3. Cuando su coraz\\u00f3n, secretamente rendido al carism\\u00e1tico tit\\u00e1n empresarial Yuu Sakuta, logra un matrimonio con \\u00e9l, Tsukino cree haber tocado las estrellas. Pero la realidad es un fr\\u00edo espejismo: tras tres a\\u00f1os de un enlace oculto, Yu...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":51153,\"titulo\":\"Cautivada por la promesa de un verano que olvid\\u00e9\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/07\\/VERANO12DS.webp\",\"fecha\":\"2025-07-05 17:50:37\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Cautivada por la promesa de un verano que olvid\\u00e9\\r\\n\\r\\nMinami, una estrella fugaz en el firmamento del espect\\u00e1culo, ilumina el mundo con su belleza innata, conq