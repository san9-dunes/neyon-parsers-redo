falta de piedad, gobierna. Sin embargo, ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50867,\"titulo\":\"En esta vida, renuncio a ser la reina villana\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/ESTAVIDA12.webp\",\"fecha\":\"2025-06-23 16:52:46\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"En esta vida, renuncio a ser la reina villana\\r\\n\\r\\nEleanor, la infame reina del reino de Fortuna, es asesinada en su coronaci\\u00f3n por su hermana Carolina. Antes de morir, escucha una voz extra\\u00f1a que dice \\u201cMisi\\u00f3n de rango S completada\\u201d, revelando que el cuerpo de Carolina est\\u00e1 pose\\u00eddo por otra alma y que Eleanor fue sacrificada por un misterioso prop\\u00f3sito. Al recuperar la conciencia, Elean...\",\"esGratis\":true,\"firstChapterId\":52669,\"status\":\"Ongoing\"},{\"id\":50448,\"titulo\":\"Un har\\u00e9n libre y desenfrenado en otro mundo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/HAREN12D.webp\",\"fecha\":\"2025-06-18 18:11:07\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"+19\",\"Magia\",\"Manga juvenil de acci\\u00f3n\",\"Harem\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Un har\\u00e9n libre y desenfrenado en otro mundo\\r\\nLos aventureros arriesgan sus vidas luchando contra monstruos y explorando mazmorras. Pero lo que m\\u00e1s necesitan es\\u2026 \\u00a1sexo! Kai, un aventurero de alto nivel, se adentra en mazmorras junto a hermosas chicas, como la sacerdotisa Alicia. Cada noche, tras completar una misi\\u00f3n con \\u00e9xito, disfrutan de un momento dulce y emocionante con los miembros d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50381,\"titulo\":\"\\u00bfEs incluso esta mentira parte del destino?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/MENTIRA12W.webp\",\"fecha\":\"2025-06-17 22:09:46\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Magia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfEs incluso esta mentira parte del destino?\\r\\nMelissa, una joven marginada y maltratada en la sombr\\u00eda mansi\\u00f3n de los condes, anhela liberarse de las cadenas de su cruel destino. En su audaz huida, un encuentro fortuito con un misterioso muchacho desencadena un milagro: la magia que opacaba su belleza se desvanece, y las heridas que marcaban su cuerpo sanan como por arte de magia. Sin tiempo p...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50379,\"titulo\":\"Reencarnada como la villana de mi novela adolescente: \\u00a1Mis habilidades de oficinista salvar\\u00e1n mi destino!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/MOVIL12W.webp\",\"fecha\":\"2025-06-17 21:53:37\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Reencarnada como la villana de mi novela adolescente: \\u00a1Mis habilidades de oficinista salvar\\u00e1n mi destino!\\r\\nUn chispazo de incredulidad atraviesa a Yumi cuando, tras ser absorbida por su viejo tel\\u00e9fono plegable, despierta en un mundo que conoce demasiado bien: \\u00a1es la villana de la novela cursi que escribi\\u00f3 en su adolescencia! Encarnada como la detestable dama de la \\\"Sociedad Aristocr\\u00e1tica\\\"...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50383,\"titulo\":\"El diario del lamebotas del conde\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/DIARIO12D.webp\",\"fecha\":\"2025-06-16 23:12:16\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El diario del lamebotas del conde\\r\\nLa hija del duque, conocida como la \\\"primera dama del imperio\\\", es abandonada por su prometido, quedando a punto de convertirse en el hazmerre\\u00edr de la capital. Para vengarse de su despreciable exnovio, ella aprovecha un accidente que lo deja amn\\u00e9sico y le crea una falsa memoria, haci\\u00e9ndole creer que est\\u00e1 profundamente enamorado de ella y que es su devoto s...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50372,\"titulo\":\"Titanic y su latido final: la reencarnada que desaf\\u00eda un destino cruel entre amores prohibidos y enga\\u00f1os\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/TITANIC2W.webp\",\"fecha\":\"2025-06-16 15:23:32\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Supervivencia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Titanic y su latido final: la reencarnada que desaf\\u00eda un destino cruel entre amores prohibidos y enga\\u00f1os\\r\\nAlice, una joven de 19 a\\u00f1os fascinada por los ecos del pasado en una exposici\\u00f3n del Titanic, se ve atrapada en un caos inesperado cuando una amenaza de bomba sacude su realidad. En un parpadeo, despierta en un mundo ajeno, acompa\\u00f1ada por su amigo de la infancia, Noah, y catapultada al ...\",\"esGratis\":true,\"firstChapterId\":50387,\"status\":\"Ongoing\"},{\"id\":50367,\"titulo\":\"Anhelo ser tu primer y \\u00fanico amor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/UNICO12W.webp\",\"fecha\":\"2025-06-16 02:08:31\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Anhelo ser tu primer y \\u00fanico amor\\r\\nAerial, una joven duquesa marcada por la ceguera, ha enfrentado una vida de desprecio y rechazo. La sociedad la margina, y sus compromisos matrimoniales se deshacen uno tras otro, dejando su coraz\\u00f3n envuelto en sombras. Pero un d\\u00eda, un destello inesperado ilumina su mundo: el caballero m\\u00e1s codiciado del imperio, un hombre cuya reputaci\\u00f3n eclipsa