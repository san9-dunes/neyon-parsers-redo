la emperatriz viuda\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/VIUDA12F.webp\",\"fecha\":\"2025-04-17 23:37:23\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Ni\\u00f1os\",\"Madre\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El espl\\u00e9ndido giro de la emperatriz viuda\\r\\nLa protagonista, Ria Sugisaki, es una oficinista soltera. Un d\\u00eda, de repente, viaja en el tiempo a un mundo de espadas y magia, donde se encuentra reencarnada como Lilia Lorenzo, una reina viuda con un hijo, que acaba de perder a su esposo, el rey Charles. En medio de un caos pol\\u00edtico con facciones enfrentadas, y considerando que la propia Lilia es ...\",\"esGratis\":true,\"firstChapterId\":48574,\"status\":\"Ongoing\"},{\"id\":48443,\"titulo\":\"En esta vida no perdonar\\u00e9 a mi hermanita\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/ESTAVIDA12F.webp\",\"fecha\":\"2025-04-14 16:50:46\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"En esta vida no perdonar\\u00e9 a mi hermanita\\r\\nLa hija mayor de la familia ducal, Sof\\u00eda, cae en la despreciable trampa de su hermanita adoptiva, Alice, y termina enfrent\\u00e1ndose al pat\\u00edbulo. En el instante en que su vida se desvanece junto con un intenso arrepentimiento, \\u00a1el tiempo retrocede milagrosamente diez a\\u00f1os! \\\"En esta vida no cometer\\u00e9 m\\u00e1s errores. \\u00a1Esta vez ser\\u00e9 yo quien le arrebate ...\",\"esGratis\":true,\"firstChapterId\":48532,\"status\":\"Ongoing\"},{\"id\":48436,\"titulo\":\"Reencarn\\u00e9 como una hero\\u00edna d\\u00e9bil, as\\u00ed que me vengar\\u00e9\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/HEROINA12G.webp\",\"fecha\":\"2025-04-13 19:07:52\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Reencarn\\u00e9 como una hero\\u00edna d\\u00e9bil, as\\u00ed que me vengar\\u00e9\\r\\nHaruna Tsuda, una locutora de transmisiones de audiolibros, estaba insatisfecha con el final de una novela sobre una hero\\u00edna sumisa tipo \\\"felpudo\\\". De repente, se encuentra reencarnada como la protagonista de esa misma historia. Adem\\u00e1s, descubre que cuenta con un \\\"sistema de transmisi\\u00f3n en l\\u00ednea\\\" que le permite obtener el apoyo y la...\",\"esGratis\":true,\"firstChapterId\":49066,\"status\":\"Ongoing\"},{\"id\":48392,\"titulo\":\"El poder absoluto del destino amoroso: C\\u00f3mo una soldado termin\\u00f3 siendo la protagonista amada en su reencarnaci\\u00f3n\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/01-1.webp\",\"fecha\":\"2025-04-12 15:29:13\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El poder absoluto del destino amoroso: C\\u00f3mo una soldado termin\\u00f3 siendo la protagonista amada en su reencarnaci\\u00f3n\\r\\nEn un mundo donde los humanos son arrastrados a las guerras de los dioses, la soldado Louise destacaba en la primera l\\u00ednea de batalla. Gravemente herida, muere en los brazos de Erich, un compa\\u00f1ero con quien ten\\u00eda una relaci\\u00f3n de rivalidad extrema. En ese momento, Louise no lo...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":43327,\"titulo\":\"La madrastra villana posee un gran secreto\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/12\\/SECRETO12W.webp\",\"fecha\":\"2025-04-11 16:15:09\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Ni\\u00f1os\",\"Madre\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La madrastra villana posee un gran secreto\\r\\nRirika, quien trabajaba como profesora, se encuentra repentinamente absorbida por un libro y reencarnada como emperatriz. Al principio, piensa que es fant\\u00e1stico no tener que trabajar y se entusiasma con su guapo esposo. Sin embargo, pronto se da cuenta de que viene de otro mundo y que si descubren su origen, ser\\u00e1 ejecutada. Para sobrevivir, Ririka d...\",\"esGratis\":true,\"firstChapterId\":48370,\"status\":\"Ongoing\"},{\"id\":48002,\"titulo\":\"Me convert\\u00ed en la doncella del conde yandere\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/YANDERE12F.webp\",\"fecha\":\"2025-04-06 19:34:41\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me convert\\u00ed en la doncella del conde yandere\\r\\nLa protagonista, Mia Rukawa, se queda dormida durante el trabajo extra una noche y, al despertar, se encuentra reencarnada en el mundo de una historia como Mia, la doncella exclusiva de Kroy, un personaje villano de tipo yandere. Para Kroy, un joven maltratado y no amado por quienes lo rodean, Mia se convierte en su \\u00fanica luz de esperanza. M\\u00e1s ta...\",\"esGratis\":true,\"firstChapterId\":48445,\"status\":\"Ongoing\"},{\"id\":47964,\"titulo\":\"El pr\\u00edncipe ca\\u00eddo en la oscuridad, en esta vida lo domesticar\\u00e9 yo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/DOMESTI12D.webp\",\"fecha\":\"2025-04-01 18:59:20\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El pr\\u00edncipe ca\\u00eddo en la oscuridad, en esta vida lo domesticar\\u00e9 yo\\r\\n\\u00a1Yo impedir\\u00e9 tu \\\"ca\\u00edda en la oscuridad\\\"! Iz\\u00e9ria, conocida como la \\\"noble empobrecida que se qued\\u00f3 soltera\\\", se casa con Radir, un miembro de la realeza temido como el \\\"duque de sangre fr\\u00eda\\\". Sin embargo, la vida matrimonial con este hermoso hombre de encanto peligroso termina en un desenlace tr\\u00e1gico... Y entonces, ines...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47865,\"titulo\":\"El amor obsesivo del joven noble que domestiqu\\u00e9\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/DOMES12F.webp\",\"fecha\":\"2025-03-29 14:01:36\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El amor obsesivo del joven noble que domestiqu\\u00e9\\r\\n\\r\\nIrene Tirion, quien reencarn\\u00f3 como la hija ca\\u00edda en desgracia de una novela, es adoptada por la familia del Duque de Casaros, donde conoce a Athan Casaros, el hijo ileg\\u00edtimo del duque. En la novela original, Irene se convierte en una villana que maltrata a Athan, su hermanito adoptivo, y termina siendo asesinada por \\u00e9l. Para evitar su muer...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47798,\"titulo\":\"El arrogante presidente no puede resistirse a m\\u00ed\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/RESISTIRSE12W.webp\",\"fecha\":\"2025-03-23 08:42:30\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El arrogante presidente no puede resistirse a m\\u00ed\\r\\n\\r\\nYuka Ito, atrapada en las artima\\u00f1as de un presidente de coraz\\u00f3n oscuro, est\\u00e1 harta de ser usada como un trapo viejo d\\u00eda tras d\\u00eda. Para colmo, parece que \\u00e9l est\\u00e1 interesado en ella... Justo cuando planeaba escapar, descubre un secreto del presidente que pone su vida en peligro. Preparada para aceptar su muerte, Yuka se encuentra con un ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47782,\"titulo\":\"En esta vida tambi\\u00e9n deseo la muerte\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/ESTAVIDA12.webp\",\"fecha\":\"2025-03-21 04:30:26\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Sistema\",\"Viaje entre Mundos\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"En esta vida tambi\\u00e9n deseo la muerte\\r\\n\\\"Cuando esta misi\\u00f3n termine, morir\\u00e9 y pasar\\u00e9 al pr\\u00f3ximo mundo...\\\"\\r\\nAquellos que firman un contrato con el \\\"sistema de villanos\\\" est\\u00e1n destinados a viajar por m\\u00faltiples mundos, asumiendo el papel de villano en cada historia. La joven enferma Ruan Xiaoli, postrada en una cama, se convierte en contratista del sistema de villanos a cambio de que le salve...\",\"esGratis\":true,\"firstChapterId\":51111,\"status\":\"Ongoing\"},{\"id\":47780,\"titulo\":\"La caprichosa noble ama al rey demonio\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/CAPRI12D.webp\",\"fecha\":\"2025-03-21 04:08:21\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Magia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La caprichosa noble ama al rey demonio\\r\\nFreya, una joven noble que ha sido mimada y adorada toda su vida, termina, por un giro inesperado, firmando un contrato de sangre con el rey demonio. Desde entonces, su vida se ve sacudida por d\\u00edas llenos de sorpresas: el temido rey demonio no se aparta de su lado ni un instante, y descubre secretos impactantes sobre su prometido, quien era su amigo de l...\",\"esGratis\":true,\"firstChapterId\":48278,\"status\":\"Ongoing\"},{\"id\":47481,\"titulo\":\"La villana secundaria que definitivamente morir\\u00e1, quiere experimentar su primer amor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/EXPERI12F.webp\",\"fecha\":\"2025-03-19 18:21:11\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Har\\u00e9n Inverso\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La villana secundaria que definitivamente morir\\u00e1, quiere experimentar su primer amor\\r\\nAl despertar, \\u00a1descubre que ha reencarnado como una villana secundaria de su novela rom\\u00e1ntica favorita! La personaje en la que se ha convertido, Layla, es una figura menor que maltrata a la hero\\u00edna, es odiada por su prometido y est\\u00e1 destinada a morir en un accidente de carruaje. Usando el tiempo en el que...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47466,\"titulo\":\"Me convert\\u00ed en una santa ca\\u00edda que lleva en su vientre a un tirano\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/VIENTRE12W.webp\",\"fecha\":\"2025-03-16 21:18:36\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me convert\\u00ed en una santa ca\\u00edda que lleva en su vientre a un tirano\\r\\nLa protagonista reencarna en el mundo de su novela fant\\u00e1stica favorita, pero 30 a\\u00f1os antes de los eventos principales. Al despertar, descubre que se ha convertido en Selena, la villana y madre del tirano Exzebia, quien llevar\\u00e1 al mundo a la ruina. Si sigue as\\u00ed, su destino ser\\u00e1 una ejecuci\\u00f3n segura. Para evitarlo, debe e...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47461,\"titulo\":\"La diva exiliada teje un amor eterno con su torpe esposo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/DIVA12E.webp\",\"fecha\":\"2025-03-14 16:56:38\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La diva exiliada teje un amor eterno con su torpe esposo\\r\\n\\\"Seguro que aqu\\u00ed tampoco hay un lugar para m\\u00ed.\\\" Elena Sazandra, maltratada por su familia y incapaz de cumplir su rol como diva, pierde a su prometido a manos de su hermanita y es expulsada de su hogar natal como una \\\"in\\u00fatil\\\". Forzada por sus padres, su destino matrimonial la lleva al conde Luvar Alvin, conocido como el \\\"Devorador de ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47459,\"titulo\":\"La joven que regresa de la muerte quiere evitar un matrimonio infeliz\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/INFELIZ12D.webp\",\"fecha\":\"2025-03-14 16:36:01\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La joven que regresa de la muerte quiere evitar un matrimonio infeliz\\r\\nReika Serizawa lo perdi\\u00f3 todo debido a la traici\\u00f3n de su esposo y fue envenenada hasta la muerte en medio de la desesperaci\\u00f3n. \\\"\\u00a1Jam\\u00e1s perdonar\\u00e9 a mi esposo y a su amante!\\\" Tal vez porque ese fue su \\u00faltimo pensamiento al morir, al abrir los ojos se encontr\\u00f3 en el d\\u00eda en que deb\\u00eda presentar los documentos de matrimo...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47456,\"titulo\":\"La criada oprimida se intercambia con la fr\\u00e1gil noble y busca venganza\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/CRIADA12E.webp\",\"fecha\":\"2025-03-14 16:18:50\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La criada oprimida se intercambia con la fr\\u00e1gil noble y busca venganza\\r\\nBella, una criada en la casa del duque Ritas, sufre un cruel acoso por parte de Ofelia, la hija del duque, hasta que un d\\u00eda decide escapar. Sin embargo, alguien la empuja desde el segundo piso y cae. \\\"Estoy muerta...\\\" pens\\u00f3, pero al abrir los ojos, \\u00a1descubre que est\\u00e1 en el cuerpo de Matilda, la otra hija de la familia ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47454,\"titulo\":\"Apoder\\u00e1ndome del Pr\\u00edncipe Heredero\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/APODE12W.webp\",\"fecha\":\"2025-03-14 15:50:38\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Apoder\\u00e1ndome del Pr\\u00edncipe Heredero\\r\\nAl atravesar a un libro y convertirme en una bruja lujuriosa a la que todos quieren matar, intento escapar de la muerte predestinada por la trama... \\u00bfQu\\u00e9? \\u00bfEl protagonista masculino tambi\\u00e9n transmigr\\u00f3 con su alma? \\u00bfEl personaje secundario masculino ha renacido? \\u00bfY la protagonista femenina ha despertado una conciencia como personaje de papel? \\u00a1\\u00bfC\\u00f3m...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47452,\"titulo\":\"\\u00bfNo hab\\u00edamos quedado en tener un amor puro?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/PURO12W.webp\",\"fecha\":\"2025-03-14 14:19:48\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfNo hab\\u00edamos quedado en tener un amor puro?\\r\\nCuando la protagonista, una mujer s\\u00e1dica y dominante, atraviesa al cuerpo de una princesa d\\u00e9bil y dependiente de una naci\\u00f3n ca\\u00edda en una novela para adultos... \\u00bfpodr\\u00e1 mantenerse pura en un entorno rodeado de lobos? \\u00a1Espera un momento! \\u00bfNo hab\\u00edamos quedado en que ser\\u00eda amor puro? \\u00bfPor qu\\u00e9 todos, uno tras otro, son protagonistas masculino...\",\"esGratis\":true,\"firstChapterId\":48006,\"status\":\"Ongoing\"},{\"id\":47448,\"titulo\":\"La villana sigue molesta hoy tambi\\u00e9n por los protagonistas masculinos\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/MOLESTA12Q.webp\",\"fecha\":\"2025-03-13 13:16:55\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Comedia\",\"Drama\",\"Har\\u00e9n Inverso\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La villana sigue molesta hoy tambi\\u00e9n por los protagonistas masculinos\\r\\nLaura G., quien de alguna manera termin\\u00f3 poseyendo a una villana.\\r\\nSu \\u00fanico objetivo es vivir tranquilamente como una desempleada, pero se ve envuelta en incidentes uno tras otro,\\r\\ny hombres que no le interesaban en absoluto antes de la posesi\\u00f3n comenzaron a aferrarse a ella.\\r\\nUn caballero escolta de origen esclavo, un m...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47445,\"titulo\":\"Mi esposo se parece a mi primer amor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/PARECE12K.webp\",\"fecha\":\"2025-03-13 12:43:25\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Mi esposo se parece a mi primer amor\\r\\n\\r\\nEl primer amor de Irina, Michael, muri\\u00f3 in\\u00fatilmente en un accidente de carruaje. Antes de que el dolor siquiera se desvaneciera, Irina fue forzada a un matrimonio arreglado. \\r\\nY su pareja era\\u2026\\r\\nel hermano gemelo de su amante fallecido, el duque Schneider. \\r\\n\\u00c9l impuls\\u00f3 el matrimonio sin mostrar ni una pizca de emoci\\u00f3n, y Irina jur\\u00f3 que nunca abrir?...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47252,\"titulo\":\"El amor de Luana, la decapitadora\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/LUANA112W.webp\",\"fecha\":\"2025-03-12 11:05:44\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El amor de Luana, la decapitadora\\r\\nLa familia del marqu\\u00e9s Mercier, encargada de proteger a la realeza y ejecutar a los criminales, tiene una \\u00fanica hija: Luana. Aunque en apariencia es una joven noble de salud fr\\u00e1gil, en realidad es la temida \\\"Decapitadora de Mercier\\\", la m\\u00e1s fuerte y cruel de su linaje. La familia Mercier es evitada por la sociedad, considerada un mal augurio. Preocupado po...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47250,\"titulo\":\"La princesa que regresa en el tiempo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/TIEMPO12F.webp\",\"fecha\":\"2025-03-12 10:54:49\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La princesa que regresa en el tiempo\\r\\nLa protagonista, la princesa imperial Ang\\u00e9lica, era la favorita del emperador Legalia, su padre, y conocida como la flor m\\u00e1s hermosa del imperio, viviendo sus d\\u00edas con alegr\\u00eda. Sin embargo, un d\\u00eda es falsamente acusada de asesinar al emperador Legalia. Para colmo, es capturada por Siegwald, el vicecapit\\u00e1n de la guardia imperial a quien admiraba, y enc...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47103,\"titulo\":\"Convert\\u00ed al protagonista inestable en un perro fiel\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/FIEL12H.webp\",\"fecha\":\"2025-03-09 20:56:10\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Venganza\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Convert\\u00ed al protagonista inestable en un perro fiel\\r\\nLa joven condesa Kadis viv\\u00eda sus d\\u00edas llorando por las infidelidades de su prometido. Sin embargo, un d\\u00eda, de repente, recupera los recuerdos de su vida anterior y se da cuenta de que ha reencarnado como la hero\\u00edna de la novela Crescent. Habiendo sido oprimida tanto en su vida pasada como en la actual, decide que a partir de ahora vivir?...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47101,\"titulo\":\"El duque fantasma est\\u00e1 obsesionado con la jefa de las doncellas\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/JEFALLAS12D.webp\",\"fecha\":\"2025-03-09 19:55:51\",\"tipo\":\"Manga\",\"genres\":[\"Comedia\",\"Drama\",\"Protagonista femenina fuerte\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El duque fantasma est\\u00e1 obsesionado con la jefa de las doncellas\\r\\nHart Bolton I, quien contribuy\\u00f3 a la unificaci\\u00f3n continental del Imperio Augus, recibi\\u00f3 el t\\u00edtulo de duque por parte del primer emperador, pero falleci\\u00f3 a la temprana edad de 26 a\\u00f1os. Sin hijos que heredaran su t\\u00edtulo, este pas\\u00f3 a sus hermanos, aunque el alma de Hart qued\\u00f3 atrapada en la mansi\\u00f3n ducal durante 100 a\\u00f1os ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47099,\"titulo\":\"Tras renacer, solo quer\\u00eda vengarme, pero \\u00bftermin\\u00e9 confes\\u00e1ndome accidentalmente al hombre m\\u00e1s peligroso del imperio\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/PELIGROSO12D.webp\",\"fecha\":\"2025-03-09 16:03:23\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Tras renacer, solo quer\\u00eda vengarme, pero \\u00bftermin\\u00e9 confes\\u00e1ndome accidentalmente al hombre m\\u00e1s peligroso del imperio?\\r\\nComo hija \\u00fanica de un conde, Anf\\u00eda fue enga\\u00f1ada por su madrastra y su hermanita para casarse con un hombre despreciable, tras lo cual sufri\\u00f3 abusos y muri\\u00f3 tr\\u00e1gicamente. Al renacer, decide transformarse en una persona astuta para arrebatarle a su hermanita al joven duq...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47096,\"titulo\":\"Le propuse matrimonio accidentalmente al Papa, durante el proceso de mi venganza\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/PAPA12W-1.webp\",\"fecha\":\"2025-03-09 14:55:49\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Venganza\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Le propuse matrimonio accidentalmente al Papa, durante el proceso de mi venganza\\r\\nEste es el mundo de un drama de nobles occidentales. La princesa imperial Helen, un personaje secundario que apoy\\u00f3 con todas sus fuerzas a su hermano menor solo para ser asesinada miserablemente por \\u00e9l en complicidad con la hero\\u00edna, viaja en el tiempo al d\\u00eda en que comenz\\u00f3 su tragedia. Para vengarse de quiene...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47094,\"titulo\":\"El secreto del hombre perfecto\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/SECRETO12F.webp\",\"fecha\":\"2025-03-09 13:52:56\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Comedia\",\"Trabajo de oficina\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El secreto del hombre perfecto\\r\\nTeho, el presidente de la compa\\u00f1\\u00eda de alimentos saludables \\\"Sowon\\\" y tambi\\u00e9n la imagen publicitaria de sus potenciadores energ\\u00e9ticos, cautiva a hombres y mujeres por igual con su atractivo f\\u00edsico y carisma de estrella. Sin embargo, para Suyong, quien trabaja en el equipo de planificaci\\u00f3n de productos de Sowon, no es m\\u00e1s que un jefe arrogante y narcisista. ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47091,\"titulo\":\"La doncella del imperio\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/IMPERIO12W.webp\",\"fecha\":\"2025-03-08 09:55:55\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La doncella del imperio\\r\\n\\r\\n\\\"Una apariencia com\\u00fan y corriente, la hija ileg\\u00edtima de un noble menor.\\\"\\r\\nAunque no tiene un origen destacable, gracias a su ingenio excepcional,\\r\\nLeona, con su condici\\u00f3n de doncella, logra hacerse con el poder. \\r\\nSin embargo, en el momento en que el imperio, que ella cre\\u00eda eterno,\\r\\nse derrumba bajo la invasi\\u00f3n enemiga,\\r\\ntambi\\u00e9n ella encuentra la muerte bajo la ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":47089,\"titulo\":\"\\u00a1Pap\\u00e1, no voy a hacer nada!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/NOHARE12HNH.webp\",\"fecha\":\"2025-03-08 09:40:22\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Ni\\u00f1os\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1Pap\\u00e1, no voy a hacer nada!\\r\\n\\\"As\\u00ed como tu nacimiento no me caus\\u00f3 ninguna emoci\\u00f3n, tu muerte tampoco tendr\\u00e1 ning\\u00fan significado para m\\u00ed.\\\" Diamid, el villano jefe de sangre fr\\u00eda que aparece en la novela fant\\u00e1stica La espada de la venganza. Jayna, nacida entre \\u00e9l y una madre del clan drag\\u00f3n, es considerada una \\\"existencia impura\\\". En el a\\u00f1o en que cumpli\\u00f3 10 a\\u00f1os, Jayna es abandonada...\",\"esGratis\":true,\"firstChapterId\":47173,\"status\":\"Ongoing\"},{\"id\":47087,\"titulo\":\"Reencarn\\u00e9 en otro mundo y me convert\\u00ed en la doncella del enemigo de mi favorito\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/ENEMIGO12F.webp\",\"fecha\":\"2025-03-08 09:30:26\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Reencarn\\u00e9 en otro mundo y me convert\\u00ed en la doncella del enemigo de mi favorito\\r\\nMikako, tras completar la ruta de su personaje favorito, Aaron, en su adorado juego otome, no pod\\u00eda evitar emocionarse hasta las l\\u00e1grimas al recordar c\\u00f3mo logr\\u00f3 superar los constantes obst\\u00e1culos del enemigo de Aaron, Claude Langlois. Llena de satisfacci\\u00f3n por su logro, Mikako se qued\\u00f3 dormida profundamente...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46746,\"titulo\":\"\\u00bfC\\u00f3mo llevarse bien con mi esposo malvado?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/BIEN12D.webp\",\"fecha\":\"2025-03-06 01:03:25\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Protagonista femenina fuerte\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfC\\u00f3mo llevarse bien con mi esposo malvado?\\r\\nLa se\\u00f1orita duquesa, nacida en una familia noble de la capital imperial y de constituci\\u00f3n delicada, escapa sola la noche antes de ser entregada por su madrastra adicta al juego para saldar una deuda. Busca refugio en el prometido con quien tiene un compromiso desde la infancia: el Gran Caballero del Norte, conocido como el \\\"perro feroz del imperio...\",\"esGratis\":true,\"firstChapterId\":46748,\"status\":\"Ongoing\"},{\"id\":46744,\"titulo\":\"Convirti\\u00e9ndose en reina a los tres a\\u00f1os\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/TRESANOS12D.webp\",\"fecha\":\"2025-03-05 22:24:40\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Convirti\\u00e9ndose en reina a los tres a\\u00f1os\\r\\nLa reina Sheila, quien muri\\u00f3 tr\\u00e1gicamente en su vida anterior, no solo renace como la peque\\u00f1a princesa de un pa\\u00eds enemigo, sino que tambi\\u00e9n se convierte en la sobrina de su esposo de su vida pasada. \\u00a1Esta vez, como una reina t\\u00edtere de 3 a\\u00f1os, jura vengarse y recuperar todo lo que le pertenece!\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46742,\"titulo\":\"El tirano sediento de sangre result\\u00f3 ser mi exmarido\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/SEDIENTO12E.webp\",\"fecha\":\"2025-03-05 22:01:10\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El tirano sediento de sangre result\\u00f3 ser mi exmarido\\r\\nLin Lei transmigr\\u00f3 al cuerpo de Grace Gottlieb, su personaje favorito de la novela tr\\u00e1gica que estaba leyendo, La rosa blanca de Etava. Grace es una reina que termina muriendo miserablemente a manos de su esposo, el tirano sediento de sangre Charles Montbaton Albert, bajo su espada. Lo que Lin Lei no esperaba era que, en ese momento, Grac...\",\"esGratis\":true,\"firstChapterId\":48301,\"status\":\"Ongoing\"},{\"id\":46738,\"titulo\":\"\\u00a1La hija adoptiva sustituta se liberar\\u00e1!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/ADOPTIVA12G.webp\",\"fecha\":\"2025-03-05 10:19:32\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance Escolar\",\"Har\\u00e9n Inverso\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00a1La hija adoptiva sustituta se liberar\\u00e1!\\r\\nNina, quien perdi\\u00f3 a sus padres en un accidente, fue acogida por la familia Roost y desde entonces ha vivido como la sustituta de su hija Lilia. Acept\\u00f3 este papel pensando que solo tendr\\u00eda que soportarlo hasta graduarse de la Escuela Real de Magia, pero todo cambia cuando recibe el encargo de tratar la anomal\\u00eda m\\u00e1gica del pr\\u00edncipe Erland. \\u00a1Su v...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46736,\"titulo\":\"Quiero resistirme a volver a casarme con el tirano\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/QUIERO12F.webp\",\"fecha\":\"2025-03-05 10:10:16\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Comedia\",\"Protagonista femenina fuerte\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Quiero resistirme a volver a casarme con el tirano\\r\\n\\r\\nLa protagonista se reencarna como Fiaje, una joven noble de una novela rom\\u00e1ntica de fantas\\u00eda. Su papel en la historia es el de un personaje secundario insignificante, creado \\u00fanicamente para hacer destacar a\\u00fan m\\u00e1s al villano. Su destino (seg\\u00fan la trama) es tr\\u00e1gico: por conveniencia de su familia, se casa con un conde fronterizo, pero e...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46734,\"titulo\":\"\\u00bfEst\\u00e1s preparada para que te lo quiten todo? La doncella de mala reputaci\\u00f3n y el caballero del funeral heroico\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/QUITEN12F.avif\",\"fecha\":\"2025-03-05 09:15:01\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfEst\\u00e1s preparada para que te lo quiten todo? La doncella de mala reputaci\\u00f3n y el caballero del funeral heroico\\r\\nAunque la llamen villana, por el camino que desea seguir... \\u00a1la \\\"falsa doncella\\\" lo arrebatar\\u00e1 todo! Claire, una joven criada por piratas, se enfrenta al examen para convertirse en capitana de la banda, pero su camino es bloqueado por Adolf, un hombre hermoso y fr\\u00edo. \\u00c9l es un c...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46732,\"titulo\":\"Me convert\\u00ed en la hija perdida del villano\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/PERDIDA12F.avif\",\"fecha\":\"2025-03-05 08:56:46\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me convert\\u00ed en la hija perdida del villano\\r\\n\\r\\nMe convert\\u00ed en la hija perdida del villano.\\r\\nPose\\u00ed el cuerpo de una extra que ni siquiera ten\\u00eda un nombre en la novela.\\r\\nLo \\u00fanico destacado eran su cabello negro maldito y sus ojos p\\u00farpuras. \\r\\nPero\\u2026 \\u00bf\\u00a1resulta que soy la hija perdida del villano de la novela!? \\r\\n\\u201cErita, mi amada hija.\\u201d\\r\\n\\u201cMi preciosa hermanita. Te proteger\\u00e9 sin falta....\",\"esGratis\":true,\"firstChapterId\":46959,\"status\":\"Ongoing\"},{\"id\":46730,\"titulo\":\"La princesa sacrificada se fuga y termina siendo objeto de obsesi\\u00f3n\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/FUGA12WE.avif\",\"fecha\":\"2025-03-05 08:36:45\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La princesa sacrificada se fuga y termina siendo objeto de obsesi\\u00f3n\\r\\n[\\u00a1Su compa\\u00f1ero de fuga es un gran mago con un amor intenso!] La princesa Olivia del reino de Afite, debido a su peculiar constituci\\u00f3n, estaba destinada a ser ofrecida como la novia del rey demonio del desierto, Grafais. Sin embargo, el d\\u00eda de la boda, el gran mago Iks la secuestra. Para escapar de Grafais, Olivia se refug...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46707,\"titulo\":\"\\u00bfQui\\u00e9n es esa \\\"esposa in\\u00fatil\\\" de la que hablas? \\u00a1La amada genio de la magia luchar\\u00e1 por ganar su divorcio!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/INUTIL12FD.avif\",\"fecha\":\"2025-03-03 16:26:37\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Magia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfQui\\u00e9n es esa \\\"esposa in\\u00fatil\\\" de la que hablas? \\u00a1La amada genio de la magia luchar\\u00e1 por ganar su divorcio!\\r\\nYumemi, una joven condesa con un talento genial para la magia, aspiraba a ser la primera mujer en unirse a la Orden de Caballeros M\\u00e1gicos mientras perfeccionaba sus habilidades junto a su amigo de la infancia, Fried. Sin embargo, justo antes de alcanzar su sue\\u00f1o, el rey, atra\\u00eddo p...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46705,\"titulo\":\"El matrimonio estrat\\u00e9gico de la princesa imperial Sveta\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/SVETA12W.avif\",\"fecha\":\"2025-03-03 16:09:08\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Protagonista Dominante\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El matrimonio estrat\\u00e9gico de la princesa imperial Sveta\\r\\n\\r\\n\\\"Yo me casar\\u00e9 contigo. Te convertir\\u00e9 en el pr\\u00edncipe heredero...\\\"\\r\\nA simple vista, una princesa imperial tranquila y encantadora... \\u00bf\\u00a1pero en realidad una \\\"maestra\\\" astuta y formidable!? Siguiendo la profec\\u00eda de su abuela \\u2014\\\"C\\u00e1sate con el pr\\u00edncipe heredero del reino\\\"\\u2014, la princesa Sveta se casa desde el imperio m\\u00e1s poderoso ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46703,\"titulo\":\"El contrato secreto entre el marqu\\u00e9s despiadado y la noble empobrecida\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/SECRETO12D.avif\",\"fecha\":\"2025-03-03 15:49:28\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El contrato secreto entre el marqu\\u00e9s despiadado y la noble empobrecida\\r\\n\\\"\\u00bfCu\\u00e1l ser\\u00e1 tu pr\\u00f3ximo movimiento? \\u00bfIntentar\\u00e1s seducirme usando esa hermosa apariencia?\\\" Para evitar el cierre de un orfanato, Claire, la hija del conde Erisk, se infiltra sola en un baile nocturno. Su interlocutor es el marqu\\u00e9s Damien Voxie, conocido por su aversi\\u00f3n hacia las mujeres. A cambio de cumplir el deseo ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46701,\"titulo\":\"Amor ligero, menos que amantes, justo lo ideal\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/IDEAL12D.avif\",\"fecha\":\"2025-03-03 15:42:55\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Comedia\",\"Trabajo de oficina\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Amor ligero, menos que amantes, justo lo ideal\\r\\nSeri, quien piensa \\\"quiero enamorarme, pero no quiero un novio\\\", conoce un d\\u00eda a Mahiro, que comparte la misma idea. Los dos congenian de inmediato y deciden formar una relaci\\u00f3n de \\\"amor ligero\\\", disfrutando solo de las partes emocionantes y dulces del amor, como el cosquilleo y los latidos del coraz\\u00f3n. Dentro de reglas establecidas, experiment...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46699,\"titulo\":\"Fui la villana n\\u00famero uno de la escuela\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/ESCUELA12E.avif\",\"fecha\":\"2025-03-03 15:30:17\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Comedia\",\"Drama\",\"Romance Escolar\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Fui la villana n\\u00famero uno de la escuela\\r\\nTras sufrir un accidente y despertar en el hospital, la protagonista, Yuzuka Naruse, se dio cuenta de que hab\\u00eda perdido la memoria. Los que acudieron corriendo al hospital fueron, nada menos, dos chicos guapos que se presentaron como sus novios: Aoi Sakaki y Hikaru T\\u014dma. Pronto se revel\\u00f3 que la protagonista era una villana que hab\\u00eda seducido a los d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46675,\"titulo\":\"C\\u00f3mo convertir un camino de espinas en un sendero de flores\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/03\\/FLORES12W.avif\",\"fecha\":\"2025-03-02 18:41:08\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"C\\u00f3mo convertir un camino de espinas en un sendero de flores\\r\\nAi Ichijo era una estudiante promedio buscando empleo, como cualquier otra. Un d\\u00eda, simplemente recogi\\u00f3 un arete que encontr\\u00f3 ca\\u00eddo en el camino, pero al siguiente instante se dio cuenta de que hab\\u00eda entrado en un mundo desconocido. Su cuerpo ahora pertenec\\u00eda a Carne Fibwan, la princesa del Imperio Felis. Sin embargo, esta prin...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46601,\"titulo\":\"Venganza contra el conglomerado: A mi exesposa que se convirti\\u00f3 en mi cu\\u00f1ada\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/02\\/CUNADA12D.avif\",\"fecha\":\"2025-02-28 23:34:09\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Venganza contra el conglomerado: A mi exesposa que se convirti\\u00f3 en mi cu\\u00f1ada\\r\\nYukiya Ise naci\\u00f3 como hijo ileg\\u00edtimo del patriarca de una familia de un poderoso conglomerado y fue perseguido por todos sus parientes. Tras abandonar su hogar y hacerse independiente, un d\\u00eda tuvo un \\\"encuentro predestinado\\\" con Erika. Ambos se casaron, y Yukiya viv\\u00eda en la cima de la felicidad, pero esos d\\u00edas ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46598,\"titulo\":\"No puedo divorciarme porque los hombres de la familia ducal me adoran\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/02\\/HOMBRES12.webp\",\"fecha\":\"2025-02-28 23:20:34\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Ni\\u00f1os\",\"Madre\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"No puedo divorciarme porque los hombres de la familia ducal me adoran\\r\\nMe reencarn\\u00e9 en Ione, la \\\"villana\\\" de una novela famosa por sus desarrollos turbulentos y melodram\\u00e1ticos. Para ev