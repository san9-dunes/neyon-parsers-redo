Riku, el misterioso autor de cuentos de hadas que ha cautivado su imagi...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":26635,\"titulo\":\"Atrapada en un romance similar al del videojuego de citas\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/07\\/JUEGO12Q.webp\",\"fecha\":\"2024-07-01 05:26:00\",\"tipo\":\"Manga\",\"genres\":[\"Comedia\",\"Romance Escolar\",\"Har\\u00e9n Inverso\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Atrapada en un romance similar al del videojuego de citas\\r\\nKana, una estudiante que no tiene contacto con su compa\\u00f1era de clase Seria, se sorprende cuando esta \\u00faltima la llama de repente. Resulta que Seria est\\u00e1 enamorada de alguien, y su persona favorita es un atractivo personaje de un juego de amor llamado \\u201c\\u00a1Ria Koi!\\u201d. Kana decide ayudar a Seria en su vida amorosa y comienza a jugar el...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":26151,\"titulo\":\"Sobre la muerte que me diste\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/06\\/SOBRE12G.webp\",\"fecha\":\"2024-06-24 20:10:35\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Manhwa\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Sobre la muerte que me diste\\r\\nEn un mundo donde la muerte y la traici\\u00f3n se entrelazan, la princesa Eslyn Bertania termina siendo asesinada por el duque Riparius, pero su vida lejos de acabar, da un giro inesperado cuando Eslyn, quien se supon\\u00eda estaba muerta, despierta en la mansi\\u00f3n del duque. Pero hay algo extra\\u00f1o en la actitud del duque: \\u201cMi preciosa sirvienta Essie\\u2026\\u201d. Resulta que e...\",\"esGratis\":true,\"firstChapterId\":29113,\"status\":\"Ongoing\"},{\"id\":25851,\"titulo\":\"El jefe final que causa una masacre, yo, el personaje secundario, te har\\u00e9 feliz\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-conten