 de la ceremonia de compromiso, alguien la ataca y pierde el conocimiento.\\r\\n\\u00a1Y cuando despert\\u00f3, hab\\u00eda cambiado de cuerpo con Bernadette, la odiada mujer malvada!\\r\\nCuando Mar\\u00eda se entera de que Bernadette le ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":3851,\"titulo\":\"Diario de supervivencia de la princesa beb\\u00e9\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2023\\/09\\/DIARIO12WE.jpeg\",\"fecha\":\"2023-09-25 15:12:53\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Supervivencia\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Diario de supervivencia de la princesa beb\\u00e9\\r\\nSus padres lo abandonaron a la edad de dos a\\u00f1os y recibi\\u00f3 poderes divinos a la edad de cinco a\\u00f1os. Sabiendo esto, fui confiado a la gente del templo y a la familia ducal que vinieron a visitarme, y so\\u00f1\\u00e9 con una vida propia llena de esperanza. Sin embargo, el final fue miserable en el que no s\\u00f3lo fue abusado, sino que tambi\\u00e9n le robaron sus po...\",\"esGratis\":true,\"firstChapterId\":6660,\"status\":\"Ongoing\"},{\"id\":3849,\"titulo\":\"La hija ca\\u00edda es adorada por el Emperador y Su Alteza Real la Hermana Imperial\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2023\\/09\\/HIJAADO12ER.jpg\",\"fecha\":\"2023-09-25 15:10:09\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La hija ca\\u00edda es adorada por el Emperador y Su Alteza Real la Hermana Imperial\\r\\nSus padres lo abandonaron a la edad de dos a\\u00f1os y recibi\\u00f3 poderes divinos a la edad de cinco a\\u00f1os. Sabiendo esto, fui confiado a la gente del templo y a la familia ducal que vinieron a visitarme, y so\\u00f1\\u00e9 con una vida propia llena de esperanza. Sin embargo, el final fue miserable en el que no s\\u00f3lo fue abusado, ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":3521,\"titulo\":\"La hija de la hero\\u00edna quiere revertir el mal final\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2023\\/09\\/LAHIJA12WR.jpg\",\"fecha\":\"2023-09-23 16:54:34\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La hija de la hero\\u00edna quiere revertir el mal final\\r\\nNuestra protagonista era una jugadora \\u00e1vida, obsesionada con un juego de fantas\\u00eda con m\\u00faltiples resultados para su protagonista femenina.\\u00a0Despu\\u00e9s de sufrir su prematura desaparici\\u00f3n, renaci\\u00f3 en el juego como Remiliana, la hija de la protagonista femenina. Su amplio conocimiento del juego ya no sirvi\\u00f3 de nada, ya que naci\\u00f3 despu\\u00e9s de...\",\"esGratis\":true,\"firstChapterId\":3623,\"status\":\"Ongoing\"},{\"id\":3519,\"titulo\":\"Maria, la sanadora telep\\u00e1tica de animales\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2023\\/09\\/MARIA12WE.jpg\",\"fecha\":\"2023-09-23 16:52:00\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Maria, la sanadora telep\\u00e1tica de animales\\r\\nUna chica de hoy en d\\u00eda es transportada al reino de Larson despu\\u00e9s de ser atropellada por un cami\\u00f3n mientras intentaba salvar a un gato callejero.\\u00a0Se despierta en el cuerpo de Maria Lwelin.\\u00a0Mar\\u00eda vive una vida normal en los bosques del Imperio Larson.\\u00a0Aprende sobre su complicada relaci\\u00f3n con su hermana y que tiene el poder de escuchar los pens...\",\"esGratis\":true,\"firstChapterId\":3735,\"status\":\"Ongoing\"},{\"id\":2882,\"titulo\":\"El prometido de la dama exc\\u00e9ntrica\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2