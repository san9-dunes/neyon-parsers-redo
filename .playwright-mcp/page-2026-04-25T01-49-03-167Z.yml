- generic [ref=e2]: "{\"success\":true,\"total\":455,\"mangas\":[{\"id\":55426,\"titulo\":\"Soy una joven solitaria a la que solo le apasiona la magia. Sin embargo, mi disc\\u00edpulo, que ha despertado, me ha pedido matrimonio utilizando sus poderes m\\u00e1gicos sobrehumanos\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/APASIONA12D.webp\",\"fecha\":\"2026-04-23 19:36:42\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Magia\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Soy una joven solitaria a la que solo le apasiona la magia. Sin embargo, mi disc\\u00edpulo, que ha despertado, me ha pedido matrimonio utilizando sus poderes m\\u00e1gicos sobrehumanos\\r\\n\\r\\n\\u00ab\\u00a1Con esto, Nina ya es mi esposa!\\u00bbNina es una noble obsesionada con la magia que no tiene inter\\u00e9s en nada m\\u00e1s.\\r\\nPasa sus d\\u00edas ense\\u00f1\\u00e1ndole magia a su disc\\u00edpulo Leonis mientras se sumerge en sus investigaciones....\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55424,\"titulo\":\"Har\\u00e9 que el detestable duque que odia a las mujeres se enamore locamente de m\\u00ed\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/ODIAALAS12D.webp\",\"fecha\":\"2026-04-23 18:00:46\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Har\\u00e9 que el detestable duque que odia a las mujeres se enamore locamente de m\\u00ed\\r\\n\\r\\nLa pobre condesa Luna es obligada a un matrimonio pol\\u00edtico con el peor de los duques: un hombre que trata a las mujeres como simples objetos. \\u00ab\\u00a1Lo har\\u00e9 caer rendido a mis pies y luego lo desechar\\u00e9!\\u00bb Con la venganza en mente, Luna decide seducirlo y se cuela en su habitaci\\u00f3n por la noche para atacarlo\\u2026 P...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55422,\"titulo\":\"Si pudiera retroceder en el tiempo, me gustar\\u00eda vivir una vida diferente\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/VIDADI12F.webp\",\"fecha\":\"2026-04-23 17:51:42\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Si pudiera retroceder en el tiempo, me gustar\\u00eda vivir una vida diferente\\r\\n\\r\\nUna mujer de cabello rojo se aferra temblando al brazo de Su Alteza.\\r\\nAunque parece aterrorizada, me mira con una sonrisa burlona. En ese preciso instante comprend\\u00ed:\\r\\n\\u00abAh\\u2026 he sido completamente enga\\u00f1ada por ella\\u00bb.Ten\\u00eda la boca amordazada con un trapo, por lo que no pod\\u00eda emitir ni un solo sonido.\\r\\nSolo pod\\u00eda m...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55419,\"titulo\":\"La dama que se cas\\u00f3 en lugar de su hermanastra, sin darse cuenta del amor obsesivo del duque\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/ENLUGAR12F.webp\",\"fecha\":\"2026-04-22 23:03:20\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La dama que se cas\\u00f3 en lugar de su hermanastra, sin darse cuenta del amor obsesivo del duque\\r\\n\\r\\nEn lugar de su hermanastra, famosa por ser una \\u201cvillana\\u201d, Avril es obligada a casarse con el \\u201cviejo duque libertino y depravado\\u201d. Sin embargo, quien la espera all\\u00ed es Dylan, un joven hermoso que es todo lo contrario a los rumores. \\u00c9l le propone un matrimonio contractual con la condici\\u00f3n d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55417,\"titulo\":\"La villana que reinicia su vida y el duque fr\\u00edo que act\\u00faa de forma extra\\u00f1a\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/ACTUA12F.webp\",\"fecha\":\"2026-04-22 22:32:15\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La villana que reinicia su vida y el duque fr\\u00edo que act\\u00faa de forma extra\\u00f1a\\r\\n\\r\\nEn su familia de origen, Dilito era tratada como la sombra de su hermanastra y sufr\\u00eda constantes abusos.\\r\\nDespu\\u00e9s de casarse, tambi\\u00e9n vivi\\u00f3 aislada en la mansi\\u00f3n de su marido. Utilizada por Izekius, el sobrino del emperador, fue acusada injustamente de ser una \\u201cvillana\\u201d y condenada a la hoguera. \\u00abQuiero v...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55415,\"titulo\":\"Mi esposo me pill\\u00f3 en pleno acto de infidelidad\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/PILLO12F.webp\",\"fecha\":\"2026-04-22 22:20:27\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Mi esposo me pill\\u00f3 en pleno acto de infidelidad\\r\\n\\r\\nAl despertar en plena escena de adulterio, lo primero que vio fue la espada de su marido apuntando directamente hacia ella. Para evitar la ejecuci\\u00f3n, le propuso el divorcio de inmediato, pero el hombre fr\\u00edo e implacable que era su esposo\\u2026 inesperadamente se neg\\u00f3.Pensaba que solo sentir\\u00eda desprecio hacia ella\\u2026\\r\\n\\u00a1pero en realidad lo que...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55413,\"titulo\":\"Corr\\u00f3mpeme con tu deseo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/COROMPE12D.webp\",\"fecha\":\"2026-04-22 22:16:42\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Venganza\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Corr\\u00f3mpeme con tu deseo\\r\\n\\r\\nPara salvar a su madre enferma, Mira soport\\u00f3 un maltrato brutal por parte de su familia pol\\u00edtica y fue vendida como un simple objeto. Sin embargo, el d\\u00eda de su boda, descubre la cruel verdad: su madre ya hab\\u00eda muerto hace mucho tiempo. Todo hab\\u00eda sido una mentira.Al comprender que fue enga\\u00f1ada, Mira decide vengarse de su familia arroj\\u00e1ndose al violento r\\u00edo mi...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55288,\"titulo\":\"Soy candidata a Gran Duquesa, as\\u00ed que actuar\\u00e9 con sensatez\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/ASIACTUARE12F.webp\",\"fecha\":\"2026-04-17 00:37:22\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Soy candidata a Gran Duquesa, as\\u00ed que actuar\\u00e9 con sensatez\\r\\n\\r\\nA Therese, la hija de un marqu\\u00e9s que adora ahorrar y ser pr\\u00e1ctica, le llega una propuesta inesperada: convertirse en candidata a esposa del Gran Duque.Aunque proviene de una familia noble venida a menos, Therese se emociona pensando:\\r\\n\\u00ab\\u00a1Tal vez pueda convertirme en una de las damas de compa\\u00f1\\u00eda que tanto admiro!\\u00bb As\\u00ed que se ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55286,\"titulo\":\"\\u00bfQui\\u00e9n dijo que no hay ruta para la villana?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/HAYRUTA12D.webp\",\"fecha\":\"2026-04-16 23:00:26\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"\\u00bfQui\\u00e9n dijo que no hay ruta para la villana?\\r\\n\\r\\nOfelia ha reencarnado como la malvada dama (villana) de un juego otome.\\r\\nPor fin comienza a asistir a la academia que es el escenario principal del juego, \\u00a1pero ya desde la ceremonia de ingreso surge una atm\\u00f3sfera tensa con la hero\\u00edna!\\u00bfAcaso va directa hacia un mal final por culpa de la hero\\u00edna?\\r\\n\\u00a1Pues esa vida la rechaza por completo!Con ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55284,\"titulo\":\"Aunque sea, dime que es amor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/DIMEQUE12F.webp\",\"fecha\":\"2026-04-16 22:30:53\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Aunque sea, dime que es amor\\r\\n\\r\\nAunque sabe que no ser\\u00e1 correspondida, Kairen Yamada (28), una OL de casi treinta a\\u00f1os, no puede detener sus sentimientos.\\r\\nEstaba teniendo un romance en la oficina con su admirado jefe, hasta que de repente \\u00e9l anuncia su matrimonio\\u2026 y ella se entera de que solo era \\u201cla otra mujer\\u201d.Justo cuando su coraz\\u00f3n est\\u00e1 destrozado, se le acerca Ren Ayase (26), u...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55281,\"titulo\":\"Me presentaron a mi primer amor\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/PRIMER12D.webp\",\"fecha\":\"2026-04-16 21:39:21\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me presentaron a mi primer amor\\r\\n\\r\\nAzusa (29) quiere vivir un amor serio de verdad.\\r\\nDespu\\u00e9s de una desilusi\\u00f3n amorosa, su mejor amiga le presenta a alguien\\u2026 y resulta ser Y\\u016bki (29), el chico de quien estuvo enamorada en la secundaria: \\u00a1su primer amor!Llevados por el impulso del reencuentro, los dos terminan pasando una noche juntos.\\r\\nSin embargo, cuando vuelven a enfrentarse, Y\\u016bki, aunq...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55276,\"titulo\":\"Pensaba que era un rey malvado y tir\\u00e1nico, pero en realidad es muy devoto y su amor es demasiado intenso\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/PENSABA12G-1.webp\",\"fecha\":\"2026-04-15 22:33:35\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"+19\",\"Romance TL\",\"Romance Er\\u00f3tico\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"No quiero ser ejecutada, as\\u00ed que decid\\u00ed comprometerme con el cruel rey villano: Pensaba que era un rey malvado y tir\\u00e1nico, pero en realidad es muy devoto y su amor es demasiado intenso\\r\\n\\r\\n\\u00abElige: ser ejecutada o convertirte en mi consorte\\u00bb.En el reino de Raxia, gobernado por el tirano Dios (o Diosu), un hombre fr\\u00edo, despiadado y que no conf\\u00eda en nadie, la joven pastora Melina es arrestad...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55274,\"titulo\":\"La dama abandonada quiere amar tus secretos\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/SECRETOS12F.webp\",\"fecha\":\"2026-04-15 21:55:55\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La dama abandonada quiere amar tus secretos\\r\\n\\r\\n\\u201cAl tocar algo con las manos, puedo ver su pasado\\u201d\\u2026 Helene, una joven noble que posee este extra\\u00f1o poder, ha sido explotada y utilizada sin piedad por su cruel padre. Traicionada por quien m\\u00e1s deber\\u00eda protegerla, Helene se encuentra al borde de la desesperaci\\u00f3n cuando aparece ante ella el hermoso \\u201cPr\\u00edncipe de Sangre Fr\\u00eda\\u201d, Vilfiet (...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":55272,\"titulo\":\"Despu\\u00e9s de diez a\\u00f1os, mi esclavo ha regresado\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2026\\/04\\/MIESCLAVO12D.webp\",\"fecha\":\"2026-04-15 21:46:10\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Despu\\u00e9s de diez a\\u00f1os, mi esclavo ha regresado\\r\\n\\r\\nEna, la hija de una familia n