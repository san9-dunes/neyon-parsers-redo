amor imposible\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/UNAMOR12W.webp\",\"fecha\":\"2025-06-06 05:28:18\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La joven defectuosa y el duque asesino de novias: un amor imposible\\r\\nMelvy Lenoir, una joven baronesa nacida con una extra\\u00f1a condici\\u00f3n que le impide sentir cualquier emoci\\u00f3n o sensaci\\u00f3n, ha sido tratada como un \\\"art\\u00edculo defectuoso\\\" por su familia, quienes la desprecian y maltratan. Su vida da un giro cuando es obligada a casarse con Gerald Barlie, el temido \\\"Duque Asesino de Novias\\\", cuya...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":50108,\"titulo\":\"Reencarn\\u00e9 como villana, \\u00a1pero no pienso caer en la trampa del matrimonio!\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/TRAMPA12W.webp\",\"fecha\":\"2025-06-06 05:14:24\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Reencarn\\u00e9 como villana, \\u00a1pero no pienso caer en la trampa del matrimonio!\\r\\nMizuki, una oficinista que sucumbi\\u00f3 a una enfermedad tras un matrimonio infeliz con un esposo obsesionado con su madre, despierta en un nuevo mundo como Seira, una audaz y desinhibida villana de un juego otome. Escarmentada por su vida pasada, Seira se jura a s\\u00ed misma rechazar cualquier atadura rom\\u00e1ntica, especialme...\",\"esGratis\":true,\"firstChapterId\":52801,\"status\":\"Ongoing\"},{\"id\":49968,\"titulo\":\"La villana diligente se vengar\\u00e1 en esta vida\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/DELIGENTE12A.webp\",\"fecha\":\"2025-06-05 02:58:13\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La villana diligente se vengar\\u00e1 en esta vida\\r\\nBelinda, la noble hija de un duque, vivi\\u00f3 su primera vida con una devoci\\u00f3n casi obsesiva como prometida del pr\\u00edncipe heredero Raymond. Pero su rectitud fue su condena: despreciada por su r\\u00edgido car\\u00e1cter, manipulada por su hermanita adoptiva Margaret y traicionada por el hombre que amaba, Belinda enfrent\\u00f3 un final cruel. Acusada injustamente d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":49961,\"titulo\":\"Soy una villana obsesionada con mi \\u00eddolo, \\u00bfy qu\\u00e9?\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/IQUE12A.webp\",\"fecha\":\"2025-06-04 05:39:37\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Soy una villana obsesionada con mi \\u00eddolo, \\u00bfy qu\\u00e9?\\r\\n\\u00a1Vivir en el mismo mundo que su adorado \\u00eddolo y ser amada por \\u00e9l hasta los huesos! Ese es el sue\\u00f1o de toda fan\\u00e1tica, y nuestra protagonista lo hace realidad al reencarnar en el universo de un juego otome. Pero hay un peque\\u00f1o giro: no despierta como la hero\\u00edna, sino como Diana, \\u00a1la hija de su \\u00eddolo! Aunque no era exactamente el plan ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":49885,\"titulo\":\"La emperatriz silenciada resurge para reclamar su corona perdida\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/06\\/CORONA12s.webp\",\"fecha\":\"2025-06-02 07:34:49\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Magia\",\"Fantas\\u00eda\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La emperatriz silenciada resurge para reclamar su corona perdida\\r\\nSheila Teresa, la adorada soberana del Imperio Reminy, cae bajo la daga traicionera de su hermana y s