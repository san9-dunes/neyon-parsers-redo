ina maldita que fingi\\u00f3 su muerte para vengarse\\r\\n\\r\\nElise, la joven reina consorte, no puede concebir un heredero, y la causa es claramente el abuso de magia oscura por parte del rey. \\u00c9l la culpa, llam\\u00e1ndola \\\"reina maligna\\\" y maltrat\\u00e1ndola brutalmente. Tras empeorar sus heridas, Elise muere... o eso parece, pues finge su muerte para escapar del castillo. Su objetivo es llevar a la ruina ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53569,\"titulo\":\"No fui la \\u00fanica que regres\\u00f3 al pasado: La santa abandonada y el caballero leal\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/NOFUI12D.webp\",\"fecha\":\"2025-10-06 18:42:23\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"No fui la \\u00fanica que regres\\u00f3 al pasado: La santa abandonada y el caballero leal\\r\\nRose, una santa de coraz\\u00f3n puro, dedic\\u00f3 diecis\\u00e9is a\\u00f1os de su vida a sanar a su prometido, un hombre condenado por una enfermedad incurable, con la promesa de un matrimonio al final de su misi\\u00f3n sagrada. Pero el destino le asest\\u00f3 un golpe cruel: envenenada por su prometido y la ambiciosa santa Lucia, Rose cae...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":53567,\"titulo\":\"C\\u00f3mo hacer que el despiadado duque se vuelva a enamorar de m\\u00ed\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/10\\/VUELVA12D.webp\",\"fecha\":\"2025-10-06 12:36:20\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"C\\u00f3mo hacer que el despiadado duque se vuelva a enamorar de m\\u00ed\\r\\n\\r\\nGarnet, una sirvienta, y Louis, el heredero de un duque, compartieron un v\\u00ednculo especial en el pasado, pero Louis perdi\\u00f3 la vista por una enfermedad y parti\\u00f3 para recibir tratam