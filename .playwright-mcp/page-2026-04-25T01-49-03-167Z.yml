\"},{\"id\":46313,\"titulo\":\"Un matrimonio complicado con el Pr\\u00edncipe Lobo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/02\\/LOBO12D.avif\",\"fecha\":\"2025-02-14 00:28:29\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Un matrimonio complicado con el Pr\\u00edncipe Lobo\\r\\nYuki, hija de una prestigiosa familia, regrasa a la vida despu\\u00e9s de que su marido abusara de ella y la matara, y todo eso junto a su madrastra y hermastra quienes tambien fueron parte de su muerte. sabiendo todo eso, Yuki decide vengarse de las personas que la agraviaron. bueno eso era lo planeaba, Pero lo que le esperaba era un matrimonio sorpre...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":46311,\"titulo\":\"Ahora que he reencarnado, voy a vengarme como una reina malvada\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/02\\/REINA512W.avif\",\"fecha\":\"2025-02-13 23:57:23\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Ahora que he reencarnado, voy a vengarme como una reina malvada\\r\\nDesde peque\\u00f1a, a Laura se le hab\\u00eda estado ense\\u00f1ando que la obediencia es una virtud, as\\u00ed que siempre ha vivido reprimiendo sus sentimientos. Sin embargo, poco a poco, Laura se va dando cuenta de que, en realidad, estas ense\\u00f1anzas no trae ninguna consecuencia positiva. Si se muestra complaciente con sus clientes, estos se volv...\",\"esGratis\":true,\"firstChapterId\":48089,\"status\":\"Ongoing\"},{\"id\":46196,\"titulo\":\"Romper\\u00e9 toda relaci\\u00f3n con mi malvada hermana\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/02\\/ROMPERE12W.avif\",\"fecha\":\"2025-02-06 00:45:44\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Venganza\",\"Mujer\"],\"