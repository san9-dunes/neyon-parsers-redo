 Aria\\u2026 hasta que Aria la ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54359,\"titulo\":\"La ex-esposa maltratada decide comenzar una nueva vida sin su anterior marido, que la ignoraba\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/EXESPOSA12SD.webp\",\"fecha\":\"2025-11-30 15:04:36\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Drama\",\"Protagonista femenina fuerte\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La ex-esposa maltratada decide comenzar una nueva vida sin su anterior marido, que la ignoraba\\r\\n\\r\\nDurante tres a\\u00f1os, Lucia fue completamente ignorada por su marido y, tras el divorcio, la esperaba un destino a\\u00fan peor: ser enviada a un convento pobre y olvidado.\\r\\nUn d\\u00eda, mientras ard\\u00eda de fiebre por una epidemia, en el borde de la muerte recuper\\u00f3 los recuerdos de su vida anterior. Entonces ...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54281,\"titulo\":\"El Pr\\u00edncipe Durmiente quiere un beso para despertarse\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/11\\/DURMIENTE12D.webp\",\"fecha\":\"2025-11-26 18:59:19\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El Pr\\u00edncipe Durmiente quiere un beso para despertarse\\r\\n\\r\\nLuna, la hija de un duque que ha sufrido el maltrato constante de su propia familia, se ve obligada a aceptar un compromiso con el primer pr\\u00edncipe Crow en sustituci\\u00f3n de su hermanastra Anasia. Sin embargo, Crow es el centro de todo tipo de rumores desalentadores: se le describe como \\u00abel pr\\u00edncipe perezoso e in\\u00fatil\\u00bb, \\u00abel de rostro d...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":54274,\"titulo\":\"La doble que quiso ser viuda el primer d\\u00eda\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-cont