scripcion\":\"La noble abandonada florece enloquecida por la venganza\\r\\nKasumi, quien viv\\u00eda sin privaciones como la hija de una familia noble, es traicionada y abandonada por su padre. Ahora, bajo el nuevo nombre de Yukina, regresa como la reina de la noche. Con el taconeo de sus stilettos sobre la alfombra de terciopelo, est\\u00e1 decidida a aplastar el coraz\\u00f3n del poder. En el escenario del club nocturno m\\u00e1s...\",\"esGratis\":true,\"firstChapterId\":49396,\"status\":\"Ongoing\"},{\"id\":48613,\"titulo\":\"Me enamor\\u00e9 de mi novia primitiva\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/PRIMITIVA12D.webp\",\"fecha\":\"2025-04-20 17:40:45\",\"tipo\":\"Manga\",\"genres\":[\"Romance\",\"Drama\",\"Viaje entre Mundos\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me enamor\\u00e9 de mi novia primitiva\\r\\nKazuto Tatsumi, presidente de un importante grupo empresarial, sufre un accidente mientras conduce por trabajo: los frenos de su auto fallan y cae por un acantilado. Aunque sobrevive milagrosamente, el lugar donde despierta es una aldea donde la civilizaci\\u00f3n a\\u00fan no ha llegado. \\u00bfQu\\u00e9 aventuras le esperan en este mundo primitivo?\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":48611,\"titulo\":\"La joven esposa destroza su configuraci\\u00f3n de personaje\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2025\\/04\\/DEZTROZA12W.webp\",\"fecha\":\"2025-04-20 17:35:33\",\"tipo\":\"Manga\",\"genres\":[\"Drama\",\"Protagonista Dominante\",\"Romance obsesivo\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"La joven esposa destroza su configuraci\\u00f3n de personaje\\r\\nDe d\\u00eda, forman la pareja perfecta: un presidente afable y una esposa que finge ser algo tonta. Pero de noche, se transforman en un estratega que manipula informaci\\u00f3n y una seductora asesina. Mimii Kurama, heredero de la familia Kurama, tiene un cuerpo d\\u00e9bil p