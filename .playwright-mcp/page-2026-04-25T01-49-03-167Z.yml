a1\\u00bfQu\\u00e9 genial es eso?!'\\r\\nAunque era diferente, era una mujer maravillosa que fr\\u00edamente se convirti\\u00f3 en aliada del protagonista masculino.\\r\\n\\u00a1Esto est\\u00e1 bien!\\r\\nS\\u00f3lo pens\\u00e9 en la historia que se desarrolla...\",\"esGratis\":true,\"firstChapterId\":15997,\"status\":\"Ongoing\"},{\"id\":13543,\"titulo\":\"Despu\\u00e9s de volver a reencarnar, termin\\u00e9 amando a mi enemigo\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/02\\/DESPUES12W.webp\",\"fecha\":\"2024-02-21 21:19:15\",\"tipo\":\"Manhwa\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Drama\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Despu\\u00e9s de volver a reencarnar, termin\\u00e9 amando a mi enemigo\\r\\nBeatrice Shelle Marcean se despierta cinco a\\u00f1os despu\\u00e9s del d\\u00eda de su muerte en un nuevo reino: un nuevo cuerpo, en una nueva familia. Ha pasado de duquesa a princesa y el hombre de su pasado, Sierratica Yerphinen, irrumpe en su tierra para ofrecer un tratado. \\u00a1Ahora es un emperador y busca una novia de su nuevo linaje! Ahora vi...\",\"esGratis\":true,\"firstChapterId\":13546,\"status\":\"Ongoing\"},{\"id\":13488,\"titulo\":\"Me hab\\u00eda tomado la molestia de poseer a la hija malvada, pero fue despu\\u00e9s de haber hecho el mal.\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/02\\/POSEI12D.avif\",\"fecha\":\"2024-02-21 20:25:24\",\"tipo\":\"Manga\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Manhwa\",\"Comedia\",\"Protagonista Dominante\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Me hab\\u00eda tomado la molestia de poseer a la hija malvada, pero fue despu\\u00e9s de haber hecho el mal\\r\\nLa protagonista, que trabajaba todos los d\\u00edas como un esclavo de empresa, se despert\\u00f3 un d\\u00eda y se encontr\\u00f3 pose\\u00eddo por Christina, una joven de otro mundo. No es que quisiera empezar mi vida de nuevo.\\r\\n\\u00a1Seg\\u00fan mi memoria, la due\\u00f1a de este cuerpo era una mujer extremadamente malvada que ya ha...\",\"esGratis\":true,\"firstChapterId\":13490,\"status\":\"Ongoing\"},{\"id\":13392,\"titulo\":\"El viaje en el tiempo de la reina dominante al mundo del entretenimiento\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/02\\/LAREINA12F.webp\",\"fecha\":\"2024-02-07 20:47:27\",\"tipo\":\"Manhua\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Romance\",\"Comedia\",\"Drama\",\"Dominante\",\"Protagonista femenina fuerte\",\"Industria del Entretenimiento\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"El Viaje en el Tiempo de la Reina Dominante al Mundo del Entretenimiento\\r\\nOriginalmente era una general del imperio, pero accidentalmente viaj\\u00f3 a los tiempos modernos, fue secuestrada por un sistema de perros y tuvo que realizar tareas para convertirse en una estrella superior. Dominante, hermosa y atrevida, ingres\\u00f3 a la industria del entretenimiento con un alto grado de autodisciplina y un e...\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":12540,\"titulo\":\"Volviendo al a\\u00f1o en que mi esposo era un estudiante\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/01\\/VOLVER12W.webp\",\"fecha\":\"2024-01-29 15:35:09\",\"tipo\":\"Manhua\",\"genres\":[\"Reencarnaci\\u00f3n\",\"Comedia\",\"Romance Escolar\",\"Mujer\"],\"genero\":\"Mujer\",\"descripcion\":\"Volviendo al a\\u00f1o en que mi esposo era un estudiante\\r\\nBuscar estrellas no es tan bueno como perseguir maridos. \\u00a1Bai Guanggao, que viaj\\u00f3 a sus d\\u00edas escolares, decidi\\u00f3 ejercer sus derechos matrimoniales por adelantado para atrapar al futuro marido rico (actual jefe de la escuela)!\",\"esGratis\":true,\"firstChapterId\":null,\"status\":\"Ongoing\"},{\"id\":12314,\"titulo\":\"La falsa santa anula su cruel destino\",\"portada\":\"http:\\/\\/mangamukai.com\\/wp-content\\/uploads\\/2024\\/01\\/LAFALSA12